<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Super User Dashboard – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
<style>
.su-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 24px; }
.module-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.module-tab { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: all 0.15s; }
.module-tab.active { background: white; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.su-banner { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
.su-banner h2 { font-family: var(--font-head); font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.su-banner p { font-size: 13px; opacity: 0.7; }
.su-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
</style>
</head>

<script>
let user, currentTab = 'users', editingId = null;

window.onload = () => {
  initDB();
  user = requireAuth(['superuser']);
  if (!user) return;
  renderNavbar(user);
  renderStats();
  switchTab('users');
};

function renderStats() {
  const counts = {
    users: getAll('users').length,
    projects: getAll('projects').length,
    tasks: getAll('tasks').length,
    bills: getAll('bills').length,
    reports: getAll('reports').length
  };
  document.getElementById('su-stats').innerHTML = `
    <div class="stat-card" style="cursor:pointer" onclick="switchTab('users')"><div class="stat-icon"><img src="../../icons/Users.svg" alt="👥" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value">${counts.users}</div><div class="stat-label">Total Users</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="switchTab('projects')"><div class="stat-icon">📁</div><div class="stat-value">${counts.projects}</div><div class="stat-label">Projects</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="switchTab('tasks')"><div class="stat-icon">✅</div><div class="stat-value">${counts.tasks}</div><div class="stat-label">Tasks</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="switchTab('bills')"><div class="stat-icon"><img src="../../icons/DollarSign.svg" alt="💰" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value">${counts.bills}</div><div class="stat-label">Bills</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="switchTab('reports')"><div class="stat-icon">📋</div><div class="stat-value">${counts.reports}</div><div class="stat-label">Reports</div></div>
  `;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.module-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.module-tab').forEach(t => { if(t.textContent.toLowerCase().includes(tab)) t.classList.add('active'); });
  const renderers = { users: renderUsers, projects: renderProjects, tasks: renderTasks, bills: renderBills, reports: renderReports, expenses: renderExpenses, system: renderSystemConfig };
  if (renderers[tab]) renderers[tab]();
}

// ── USERS ────────────────────────────────────────────────────────
function renderUsers() {
  const users = getAll('users');
  document.getElementById('module-content').innerHTML = `
    <div class="card">
      <div class="section-header" style="margin-bottom:14px">
        <div class="section-title">User Management (${users.length} users)</div>
        <button onclick="openAddUser()" class="btn btn-primary btn-sm">+ Add User</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${users.map(u=>`
            <tr>
              <td><code style="font-size:11px">${u.id}</code></td>
              <td><div style="display:flex;align-items:center;gap:8px">${avatarEl(u.avatar||u.name.substring(0,2).toUpperCase(),28)}<strong>${u.name}</strong></div></td>
              <td style="color:var(--text-muted)">${u.email}</td>
              <td>${roleChip(u.role)}</td>
              <td style="color:var(--text-muted)">${u.phone}</td>
              <td>${statusBadge(u.status)}</td>
              <td class="actions">
                <button onclick="viewRecord('users', '${u.id}')" class="btn btn-outline btn-sm">View</button>
                <button onclick="editUser('${u.id}')" class="btn btn-secondary btn-sm">Edit</button>
                <button onclick="toggleUserStatus('${u.id}')" class="btn btn-outline btn-sm">${u.status==='active'?'Deactivate':'Activate'}</button>
                ${u.role!=='superuser'?`<button onclick="deleteUser('${u.id}')" class="btn btn-danger btn-sm">Delete</button>`:''}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function roleChip(role) {
  const map = {superuser:'badge-purple',project_manager:'badge-blue',site_engineer:'badge-orange',finance_manager:'badge-green',client:'badge-gray'};
  const labels = {superuser:'Super User',project_manager:'Project Manager',site_engineer:'Site Engineer',finance_manager:'Finance Manager',client:'Client'};
  return `<span class="badge ${map[role]||'badge-gray'}">${labels[role]||role}</span>`;
}

function sanitizeUserName(value) {
  return value.replace(/[^A-Za-z\s]/g, '').replace(/\s{2,}/g, ' ');
}

function sanitizePhone(value) {
  return value.replace(/\D/g, '').slice(0, 10);
}

function isValidUserName(value) {
  return /^[A-Za-z]+(?:\s+[A-Za-z]+)*$/.test(value);
}

function isValidPhone(value) {
  return /^\d{10}$/.test(value) && value !== '0000000000';
}

function attachUserFormValidation() {
  const nameEl = document.getElementById('u-name');
  const phoneEl = document.getElementById('u-phone');

  if (nameEl) {
    nameEl.addEventListener('input', () => {
      const sanitized = sanitizeUserName(nameEl.value);
      if (nameEl.value !== sanitized) nameEl.value = sanitized;
      clearError(nameEl);
    });
  }

  if (phoneEl) {
    phoneEl.addEventListener('input', () => {
      const sanitized = sanitizePhone(phoneEl.value);
      if (phoneEl.value !== sanitized) phoneEl.value = sanitized;
      clearError(phoneEl);
    });
  }
}

      <div class="form-row">
        <div class="form-group"><label class="form-label">Project Name <span class="req">*</span></label><input id="uc-project-name" class="form-input" value="${project.name||''}"></div>
        <div class="form-group"><label class="form-label">Location <span class="req">*</span></label><input id="uc-project-location" class="form-input" value="${project.location||''}"></div>

function attachProjectFormValidation() {
  const clientNameEl = document.getElementById('p-client-name');
  const clientPhoneEl = document.getElementById('p-client-phone');

      const sanitized = sanitizeUserName(clientNameEl.value);
      if (clientNameEl.value !== sanitized) clientNameEl.value = sanitized;
      clearError(clientNameEl);
    });

  if (clientPhoneEl) {
    clientPhoneEl.addEventListener('input', () => {
      const sanitized = sanitizePhone(clientPhoneEl.value);
      if (clientPhoneEl.value !== sanitized) clientPhoneEl.value = sanitized;
      clearError(clientPhoneEl);
    });
  }
}

function reportMaterialRow(material) {
  const item = material || {};
  return `
    <div class="report-material-row" style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;margin-bottom:10px;align-items:end">
      <div><label class="form-label">Material Name</label><input class="form-input r-mat-name" value="${item.name||''}" placeholder="e.g., Cement"></div>
      <div><label class="form-label">Quantity</label><input type="number" class="form-input r-mat-qty" value="${item.qty||''}" placeholder="e.g., 50" min="0"></div>
      <div><label class="form-label">Unit</label><select class="form-select r-mat-unit">
        <option value="">Select unit</option>
        ${['bags','kg','tons','cubic meters','liters','meters','pieces'].map(unit => `<option value="${unit}" ${item.unit===unit?'selected':''}>${unit}</option>`).join('')}
      </select></div>
      <div style="padding-bottom:2px"><button type="button" onclick="removeReportMaterialRow(this)" class="btn btn-danger btn-sm">Remove</button></div>
    </div>`;
}

function addReportMaterialRow() {
  const list = document.getElementById('r-materials-list');
  if (!list) return;
  list.insertAdjacentHTML('beforeend', reportMaterialRow({}));
}

function renderReportPhotoPreview(count) {
  return Array.from({ length: count }).map((_, index) => `
    <div style="width:80px;height:80px;background:var(--bg);border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center">
      <div style="text-align:center"><div style="font-size:18px;margin-bottom:4px"><img src="../../icons/Camera.svg" alt="Photo" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div style="font-size:11px;color:var(--text-muted)">Photo ${index + 1}</div></div>
    </div>`).join('');
}

function handleReportPhotos(event) {
  const preview = document.getElementById('r-photo-preview');
  if (!preview) return;
  preview.innerHTML = '';
  Array.from(event.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border)';
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

function removeReportMaterialRow(btn) {
  const rows = document.querySelectorAll('.report-material-row');
  if (rows.length > 1) btn.closest('.report-material-row').remove();
  else showToast('At least one material row must remain', 'warning');
}

function getReportMaterials() {
  const materials = [];
  document.querySelectorAll('.report-material-row').forEach(row => {
    const name = row.querySelector('.r-mat-name').value.trim();
    const qty = row.querySelector('.r-mat-qty').value;
    const unit = row.querySelector('.r-mat-unit').value;
    if (name && qty) materials.push({ name, qty: Number(qty), unit });
  });
  return materials;
}

function recalculateProjectSpentSU(projectId) {
  const expenses = getAll('expenses').filter(expense => expense.projectId === projectId);
  const total = expenses.reduce((sum, expense) => sum + (Number(expense.amount) || 0), 0);
  const project = getById('projects', projectId);
  if (project) update('projects', projectId, { spent: total });
}

function deleteExpenseSU(id) {
  confirmAction('Delete this expense?', () => {
    const e = getById('expenses', id);
    if (e) {
      const oldProjectId = e.projectId;
      remove('expenses', id);
      recalculateProjectSpentSU(oldProjectId);
    } else {
      remove('expenses', id);
    }
    showToast('Expense deleted', 'info');
    renderExpenses(); renderStats();
  });
}

function saveUser() {
  const nameEl = document.getElementById('u-name');
  const emailEl = document.getElementById('u-email');
  const roleEl = document.getElementById('u-role');
  const passwordEl = document.getElementById('u-password');
  const phoneEl = document.getElementById('u-phone');

  nameEl.value = sanitizeUserName(nameEl.value);
  phoneEl.value = sanitizePhone(phoneEl.value);

  const name = nameEl.value.trim();
  const email = document.getElementById('u-email').value.trim();
  const role = document.getElementById('u-role').value;
  const status = document.getElementById('u-status').value;
  const password = passwordEl.value;
  const phone = phoneEl.value.trim();

  clearError(nameEl); clearError(emailEl); clearError(roleEl); clearError(passwordEl); clearError(phoneEl);

  let valid = true;
  if (!name) { showError(nameEl,'Required'); valid=false; }
  else if (!isValidUserName(name)) { showError(nameEl,'Full name should contain alphabets only'); valid=false; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError(emailEl,'Valid email required'); valid=false; }
  if (!role) { showError(roleEl,'Required'); valid=false; }
  if (!editingId && !password) { showError(passwordEl,'Password required for new user'); valid=false; }
  if (password && password.length < 6) { showError(passwordEl,'Min 6 characters'); valid=false; }
  if (phone && !isValidPhone(phone)) { showError(phoneEl,'Phone number must be 10 digits and cannot be 0000000000'); valid=false; }

  // Check duplicate email
  const existing = getAll('users').find(u => u.email === email && u.id !== editingId);
  if (existing) { showError(emailEl,'Email already exists'); return; }

  let clientProjectData = null;
  if (!editingId && role === 'client') {
    const projectNameEl = document.getElementById('uc-project-name');
    const projectLocationEl = document.getElementById('uc-project-location');
    const projectStartEl = document.getElementById('uc-project-start');
    const projectEndEl = document.getElementById('uc-project-end');
    const projectBudgetEl = document.getElementById('uc-project-budget');
    const projectDescEl = document.getElementById('uc-project-desc');

    [projectNameEl, projectLocationEl, projectStartEl, projectEndEl, projectBudgetEl].forEach(el => clearError(el));

    const projectName = projectNameEl.value.trim();
    const projectLocation = projectLocationEl.value.trim();
    const projectStart = projectStartEl.value;
    const projectEnd = projectEndEl.value;
    const projectBudget = Number(projectBudgetEl.value);

    if (!projectName) { showError(projectNameEl,'Required'); valid=false; }
    if (!projectLocation) { showError(projectLocationEl,'Required'); valid=false; }
    if (!projectStart) { showError(projectStartEl,'Required'); valid=false; }
    if (!projectEnd) { showError(projectEndEl,'Required'); valid=false; }
    if (projectStart && projectEnd && projectEnd <= projectStart) { showError(projectEndEl,'End date must be after start date'); valid=false; }
    if (!projectBudget || projectBudget <= 0) { showError(projectBudgetEl,'Budget must be greater than 0'); valid=false; }

    clientProjectData = {
      name: projectName,
      location: projectLocation,
      startDate: projectStart,
      endDate: projectEnd,
      budget: projectBudget,
      description: projectDescEl.value.trim()
    };
  }

  if (!valid) return;

  const data = { name, email, role, status, phone, avatar: name.substring(0,2).toUpperCase() };
  if (password) data.password = password;

  if (editingId) {
    update('users', editingId, data);
    showToast('User updated!');
  }
  else {
    const newUserId = genId('U');
    create('users', { id: newUserId, createdAt: new Date().toISOString().split('T')[0], ...data });
    if (role === 'client' && clientProjectData) {
      create('projects', {
        id: genId('P'),
        clientId: newUserId,
        clientName: name,
        teamSize: 1,
        managerId: 'U002',
        progress: 0,
        status: 'On Track',
        spent: 0,
        ...clientProjectData
      });
      showToast('Client and project created!');
      renderProjects();
    } else {
      showToast('User created!');
    }
  }
  closeModal('su-modal');
  renderUsers(); renderStats();
  document.getElementById('su-save-btn').style.display = '';
}

function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  const nameEl = document.getElementById('p-name');
  clearError(nameEl);
  if (!name) { showError(nameEl,'Required'); return; }

  const startEl = document.getElementById('p-start'), endEl = document.getElementById('p-end');
  clearError(endEl);
  if (startEl.value && endEl.value && endEl.value <= startEl.value) {
    showError(endEl, 'End date must be after start date'); return;
  }
  
  const cnameEl = document.getElementById('p-client-name');
  const cemailEl = document.getElementById('p-client-email');
  const cphoneEl = document.getElementById('p-client-phone');
  const cpassEl = document.getElementById('p-client-password');
  const budgetEl = document.getElementById('p-budget');

  cnameEl.value = sanitizeUserName(cnameEl.value);
  cphoneEl.value = sanitizePhone(cphoneEl.value);

  clearError(cnameEl); clearError(cemailEl); clearError(cphoneEl); clearError(cpassEl); clearError(budgetEl);
  
  if (!cnameEl.value.trim()) { showError(cnameEl, 'Required'); return; }
  if (!isValidUserName(cnameEl.value.trim())) { showError(cnameEl, 'Client name should contain alphabets only'); return; }
  if (!cemailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cemailEl.value)) { showError(cemailEl, 'Valid email required'); return; }
  if (!cphoneEl.value.trim()) { showError(cphoneEl, 'Required'); return; }
  if (!isValidPhone(cphoneEl.value.trim())) { showError(cphoneEl, 'Phone number must be 10 digits and cannot be 0000000000'); return; }
  if (!editingId && (!cpassEl.value || cpassEl.value.length < 6)) { showError(cpassEl, 'Min 6 characters'); return; }
  if (Number(budgetEl.value) <= 0) { showError(budgetEl, 'Budget must be greater than 0'); return; }
  
  const cname = cnameEl.value.trim();
  const cemail = cemailEl.value.trim();
  const cphone = cphoneEl.value.trim();
  const cpass = cpassEl.value;

  let clientId;
  if (editingId) {
    const p = getById('projects', editingId);
    clientId = p.clientId;
    if (clientId) {
      const updates = { name: cname, email: cemail, phone: cphone };
      if (cpass) updates.password = cpass;
      update('users', clientId, updates);
    }
  } else {
    clientId = 'U' + Date.now().toString().slice(-4) + Math.floor(Math.random()*1000);
    create('users', {
      id: clientId, role: 'client', name: cname, email: cemail, phone: cphone, password: cpass, profileImage: '', status: 'active', createdAt: new Date().toISOString().split('T')[0]
    });
  }

  const pStatus = document.getElementById('p-status');
  const pProgress = document.getElementById('p-progress');

  if (pProgress) {
    clearError(pProgress);
    const pVal = Number(pProgress.value);
    if (pProgress.value !== '' && (Number.isNaN(pVal) || pVal < 0 || pVal > 100)) {
      showError(pProgress, 'Progress must be between 0 and 100');
      return;
    }
  }

  const data = {
    name,
    clientId: clientId,
    clientName: cname,
    location: document.getElementById('p-location').value.trim(),
    startDate: document.getElementById('p-start').value,
    endDate: document.getElementById('p-end').value,
    budget: Number(budgetEl.value),
    teamSize: Number(document.getElementById('p-team').value) || 1,
    description: document.getElementById('p-desc').value.trim(),
    spent: 0
  };
  
  if (pStatus) data.status = pStatus.value;
  if (pProgress) data.progress = Number(pProgress.value) || 0;

  if (editingId) { update('projects', editingId, data); showToast('Project updated!'); }
  else { 
    create('projects', { id: genId('P'), teamSize: 1, managerId: 'U002', progress: 0, status: 'On Track', ...data }); 
    showToast('Project created!'); 
  }
  closeModal('su-modal');
  renderProjects(); renderStats();
}

function saveTaskSU() {
  const title = document.getElementById('t-title').value.trim();
  const titleEl = document.getElementById('t-title');
  const progressEl = document.getElementById('t-progress');
  clearError(titleEl);
  if (!title) { showError(titleEl,'Required'); return; }
  if (progressEl) {
    clearError(progressEl);
    const progressValue = Number(progressEl.value);
    if (progressEl.value !== '' && (Number.isNaN(progressValue) || progressValue < 0 || progressValue > 100)) {
      showError(progressEl,'Progress must be between 0 and 100');
      return;
    }
  }

  const pId = document.getElementById('t-project').value;
  const eId = document.getElementById('t-engineer').value;
  const proj = getById('projects', pId);
  const eng = getById('users', eId);
  const statusEl = document.getElementById('t-status');

  const data = {
    title, projectId: pId, projectName: proj?proj.name:'',
    assignedTo: eId, assignedName: eng?eng.name:'',
    priority: document.getElementById('t-priority').value,
    status: statusEl ? statusEl.value : 'Pending',
    startDate: document.getElementById('t-start').value,
    deadline: document.getElementById('t-deadline').value,
    progress: progressEl ? (Number(progressEl.value) || 0) : 0,
    description: document.getElementById('t-desc').value.trim(),
    remarks: ''
  };

  if (editingId) { update('tasks', editingId, data); showToast('Task updated!'); }
  else { create('tasks', { id: genId('T'), ...data }); showToast('Task created!'); }
  closeModal('su-modal');
  renderTasks(); renderStats();
}

function saveBillSU() {
  const amount = Number(document.getElementById('b-amount').value);
  const amountEl = document.getElementById('b-amount');
  clearError(amountEl);
  if (!amount || amount <= 0) { showError(amountEl,'Valid amount required'); return; }

  const projEl = document.getElementById('b-project');
  if (projEl) clearError(projEl);
  if (projEl && !projEl.value) { showError(projEl,'Required'); return; }

  let pId = null;
  if (editingId) pId = getById('bills', editingId)?.projectId;
  else if (projEl) pId = projEl.value;

  if (pId) {
    const proj = getById('projects', pId);
    if (proj && amount > Number(proj.budget || 0)) {
      showError(amountEl, `Bill amount cannot exceed project budget (${formatCurrency(proj.budget)})`);
      return;
    }
  }

  const data = {
    amount,
    status: document.getElementById('b-status').value,
    milestone: document.getElementById('b-milestone').value.trim(),
    dueDate: document.getElementById('b-due').value,
    description: document.getElementById('b-desc').value.trim()
  };
  if (document.getElementById('b-reason')) data.rejectionReason = document.getElementById('b-reason').value.trim();

  if (editingId) {
    update('bills', editingId, data);
    showToast('Bill updated!');
  } else {
    data.projectId = projEl.value;
    const p = getById('projects', data.projectId);
    data.projectName = p ? p.name : '';
    data.clientName = p ? p.clientName : '';
    create('bills', { id: genId('B'), generatedBy: 'U002', generatedName: 'Super User', date: new Date().toISOString().split('T')[0], ...data });
    showToast('Bill created!');
  }
  closeModal('su-modal');
  renderBills(); renderStats();
}

function saveExpenseSU() {
  const amount = Number(document.getElementById('e-amount').value);
  const amountEl = document.getElementById('e-amount');
  clearError(amountEl);
  if (!amount || amount <= 0) { showError(amountEl,'Valid amount required'); return; }

  const pId = document.getElementById('e-project').value;
  const proj = getById('projects', pId);
  if (!proj) { showError(document.getElementById('e-project'),'Required'); return; }

  const existingProjectExpenses = getAll('expenses').filter(expense => expense.projectId === pId && expense.id !== editingId);
  const currentSpent = existingProjectExpenses.reduce((sum, expense) => sum + (Number(expense.amount) || 0), 0);
  const remainingBudget = (Number(proj.budget) || 0) - currentSpent;
  if (amount > remainingBudget) {
    showError(amountEl, `Expense exceeds remaining budget (${formatCurrency(remainingBudget)})`);
    return;
  }

  const data = {
    projectId: pId,
    projectName: proj ? proj.name : '',
    category: document.getElementById('e-category').value,
    amount,
    date: document.getElementById('e-date').value,
    description: document.getElementById('e-desc').value.trim()
  };
  let oldProjectId = null;

  if (editingId) {
    const oldE = getById('expenses', editingId);
    if (oldE) oldProjectId = oldE.projectId;
    update('expenses', editingId, data);
    showToast('Expense updated!');
  } else {
    create('expenses', { id: genId('EXP'), addedBy: user.id, ...data });
    showToast('Expense created!');
  }

  recalculateProjectSpentSU(data.projectId);
  if (oldProjectId && oldProjectId !== data.projectId) recalculateProjectSpentSU(oldProjectId);

  closeModal('su-modal');
  renderExpenses(); renderStats();
}

          <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Company Name</div><strong>${details.company || 'N/A'}</strong></div>
        </div>
      </div>
      <div style="background:var(--bg);padding:16px;border-radius:var(--radius)">
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px">Message</div>
        <div style="font-size:13px;line-height:1.7;color:var(--text)">${details.message || 'No message provided.'}</div>

function viewRecord(type, id) {
  const r = getById(type, id);
  if (!r) return;
  document.getElementById('su-modal-title').textContent = `View Details (${id})`;
  const btn = document.getElementById('su-save-btn');
  if(btn) btn.style.display = 'none';

  if (type === 'notifications' && r.title === 'New Contact Inquiry') {
    document.getElementById('su-modal-body').innerHTML = renderContactInquiryDetails(r);
    openModal('su-modal');
    return;
  }
  
  const props = Object.keys(r).map(k => {
    let val = r[k];
    if(typeof val === 'object') val = JSON.stringify(val);
    return `<div style="margin-bottom:8px"><strong>${k}:</strong> <span style="color:var(--text-muted)">${val}</span></div>`;
  }).join('');

  document.getElementById('su-modal-body').innerHTML = `
    <div style="background:var(--bg);padding:16px;border-radius:var(--radius);font-size:13px;word-break:break-all;max-height:60vh;overflow-y:auto">
      ${props}
    </div>
  `;
  openModal('su-modal');
}
</script>
