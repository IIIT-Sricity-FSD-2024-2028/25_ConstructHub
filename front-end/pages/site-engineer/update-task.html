<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Update Task Status – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="my-tasks.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> My Tasks</a>
        <a href="update-task.html" class="active"><img src="../../icons/feature.icon.svg" class="nav-icon" width="18" height="18" alt="📝" style="vertical-align:middle;margin-right:8px;"> Update Task Status</a>
        <a href="submit-report.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> Submit Site Report</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="back-btn" onclick="history.back()">← Back</div>
      <div class="page-header"><h1>Update Task Status</h1><p>Update progress and completion status</p></div>
      <div style="max-width:540px">
        <div class="card">
          <div class="form-group">
            <label class="form-label">Select Task <span class="req">*</span></label>
            <select id="task-sel" class="form-select" onchange="onTaskSelect()">
              <option value="">Select a task to update</option>
            </select>
          </div>
          <div id="task-preview" style="display:none;background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px">
            <div style="font-weight:700;font-size:14px" id="preview-title"></div>
            <div style="font-size:12px;color:var(--text-muted);margin:4px 0" id="preview-proj"></div>
            <div id="preview-progress-wrap" style="margin-top:8px"></div>
          </div>
          <div class="form-group"><label class="form-label">Completion Percentage <span class="req">*</span></label><input id="u-progress" type="number" class="form-input" min="0" max="100" placeholder="0 - 100" data-required></div>
          <div class="form-group"><label class="form-label">Status <span class="req">*</span></label>
            <select id="u-status" class="form-select" data-required>
              <option value="">Select status</option>
              <option>Pending</option><option>In Progress</option><option>Completed</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Remarks</label><textarea id="u-remarks" class="form-textarea" placeholder="Add any notes or updates..." data-maxlen="500"></textarea></div>
          <button onclick="submitUpdate()" class="btn btn-primary btn-full" style="padding:12px">✓ Update Task</button>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Success Modal -->
<div id="success-modal" class="modal-overlay">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <div style="width:60px;height:60px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✅</div>
    <h2 style="font-family:var(--font-head);margin-bottom:8px">Task Status Updated</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px">The project manager will be notified of your update.</p>
    <button onclick="window.location.href='my-tasks.html'" class="btn btn-success btn-full">View All Tasks</button>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['site_engineer']);
  if (!user) return;
  renderNavbar(user);
  populateTasks();
};

function populateTasks() {
  const tasks = getAll('tasks').filter(t => t.assignedTo === user.id && t.status !== 'Completed');
  const sel = document.getElementById('task-sel');
  sel.innerHTML = '<option value="">Select a task to update</option>';
  tasks.forEach(t => sel.innerHTML += `<option value="${t.id}">${t.title} — ${t.projectName}</option>`);
}

function onTaskSelect() {
  const id = document.getElementById('task-sel').value;
  if (!id) { document.getElementById('task-preview').style.display = 'none'; return; }
  const t = getById('tasks', id);
  document.getElementById('task-preview').style.display = 'block';
  document.getElementById('preview-title').textContent = t.title;
  document.getElementById('preview-proj').textContent = t.projectName + ' · ' + t.status;
  document.getElementById('preview-progress-wrap').innerHTML = progressBar(t.progress) + `<span style="font-size:11.5px;color:var(--text-muted);margin-top:4px;display:block">${t.progress}% complete</span>`;
  document.getElementById('u-progress').value = t.progress;
  document.getElementById('u-status').value = t.status;
  document.getElementById('u-remarks').value = t.remarks || '';
}

function submitUpdate() {
  const taskId = document.getElementById('task-sel').value;
  const progress = document.getElementById('u-progress').value;
  const status = document.getElementById('u-status').value;

  let valid = true;
  const selEl = document.getElementById('task-sel');
  const progEl = document.getElementById('u-progress');
  const statEl = document.getElementById('u-status');
  clearError(selEl); clearError(progEl); clearError(statEl);

  if (!taskId) { showError(selEl, 'Please select a task'); valid = false; }
  if (progress === '') { showError(progEl, 'Please enter completion percentage'); valid = false; }
  else if (Number(progress) < 0 || Number(progress) > 100) { showError(progEl, 'Must be between 0 and 100'); valid = false; }
  if (!status) { showError(statEl, 'Please select a status'); valid = false; }

  const remarks = document.getElementById('u-remarks').value;
  if (remarks.length > 500) { showError(document.getElementById('u-remarks'), 'Max 500 characters'); valid = false; }

  if (!valid) return;

  update('tasks', taskId, { progress: Number(progress), status, remarks: remarks.trim() });
  openModal('success-modal');
  populateTasks();
}
</script>
</body>
</html>
