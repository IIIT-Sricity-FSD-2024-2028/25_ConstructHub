<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Details – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="my-tasks.html" class="active"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> My Tasks</a>
        <a href="update-task.html"><img src="../../icons/feature.icon.svg" class="nav-icon" width="18" height="18" alt="📝" style="vertical-align:middle;margin-right:8px;"> Update Task Status</a>
        <a href="submit-report.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> Submit Site Report</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="back-btn" onclick="history.back()">← Back to My Tasks</div>
      <div id="detail-content"></div>
    </main>
  </div>
</div>

<!-- Update Status Modal -->
<div id="update-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div><h2>Update Task Status</h2><p>Update progress and completion status</p></div>
      <button class="modal-close" onclick="closeModal('update-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <div class="form-group"><label class="form-label">Completion Percentage <span class="req">*</span></label><input id="u-progress" type="number" class="form-input" min="0" max="100" placeholder="0-100"></div>
    <div class="form-group"><label class="form-label">Status <span class="req">*</span></label><select id="u-status" class="form-select"><option value="">Select status</option><option>Pending</option><option>In Progress</option><option>Completed</option></select></div>
    <div class="form-group"><label class="form-label">Remarks</label><textarea id="u-remarks" class="form-textarea" placeholder="Add notes..."></textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal('update-modal')" class="btn btn-secondary">Cancel</button>
      <button onclick="submitUpdate()" class="btn btn-primary">✓ Update Task</button>
    </div>
  </div>
</div>

<!-- Success -->
<div id="success-modal" class="modal-overlay">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <div style="width:60px;height:60px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✅</div>
    <h2 style="font-family:var(--font-head);margin-bottom:8px">Task Status Updated</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px">The project manager will be notified shortly.</p>
    <button onclick="closeModal('success-modal');renderDetail()" class="btn btn-success btn-full">Done</button>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user, task;
window.onload = () => {
  initDB();
  user = requireAuth(['site_engineer', 'project_manager', 'superuser']);
  if (!user) return;
  renderNavbar(user);
  const id = new URLSearchParams(window.location.search).get('id');
  task = getById('tasks', id);
  if (!task) { document.getElementById('detail-content').innerHTML = '<div class="empty-state"><h3>Task not found</h3></div>'; return; }
  renderDetail();
};

function renderDetail() {
  task = getById('tasks', task.id);
  const el = document.getElementById('detail-content');
  el.innerHTML = `
    <div class="page-header-row">
      <div>
        <h1 style="font-family:var(--font-head);font-size:24px;font-weight:700">${task.title}</h1>
        <div style="display:flex;gap:8px;margin-top:6px">${priorityBadge(task.priority)} ${statusBadge(task.status)}</div>
      </div>
      <button onclick="openUpdateModal()" class="btn btn-primary">Update Status</button>
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="detail-section">
        <h3>Task Information</h3>
        <div class="detail-grid">
          <div class="detail-item"><label>Task ID</label><span>${task.id}</span></div>
          <div class="detail-item"><label>Project</label><span>${task.projectName}</span></div>
          <div class="detail-item"><label>Priority</label><span>${priorityBadge(task.priority)}</span></div>
          <div class="detail-item"><label>Status</label><span>${statusBadge(task.status)}</span></div>
          <div class="detail-item"><label>Start Date</label><span>${formatDate(task.startDate)}</span></div>
          <div class="detail-item"><label>Deadline</label><span>${formatDate(task.deadline)}</span></div>
        </div>
      </div>
      <div class="detail-section">
        <h3>Progress</h3>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;color:var(--text-muted)">Completion</span>
            <span style="font-family:var(--font-head);font-weight:700;font-size:22px">${task.progress}%</span>
          </div>
          ${progressBar(task.progress)}
        </div>
        ${task.remarks ? `<div class="detail-item"><label>Latest Remarks</label><span style="font-size:13px">${task.remarks}</span></div>` : ''}
      </div>
    </div>

    <div class="detail-section">
      <h3>Description</h3>
      <p style="font-size:13.5px;line-height:1.7;color:var(--text-muted)">${task.description || 'No description.'}</p>
    </div>
  `;
  document.getElementById('u-progress').value = task.progress;
  document.getElementById('u-status').value = task.status;
  document.getElementById('u-remarks').value = task.remarks || '';
}

function openUpdateModal() {
  if (task.status === 'Completed') { showToast('Task already completed!', 'info'); return; }
  openModal('update-modal');
}

function submitUpdate() {
  const progress = document.getElementById('u-progress').value;
  const status = document.getElementById('u-status').value;
  const progEl = document.getElementById('u-progress');
  const statEl = document.getElementById('u-status');
  let valid = true;
  clearError(progEl); clearError(statEl);

  if (progress === '') { showError(progEl, 'Required'); valid = false; }
  else if (Number(progress) < 0 || Number(progress) > 100) { showError(progEl, 'Must be 0-100'); valid = false; }
  if (!status) { showError(statEl, 'Required'); valid = false; }
  if (!valid) return;

  update('tasks', task.id, { progress: Number(progress), status, remarks: document.getElementById('u-remarks').value.trim() });
  closeModal('update-modal');
  openModal('success-modal');
}
</script>
</body>
</html>
