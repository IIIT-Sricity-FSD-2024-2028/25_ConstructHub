<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tasks – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="projects.html"><img src="../../icons/Icon (2).svg" class="nav-icon" width="18" height="18" alt="📁" style="vertical-align:middle;margin-right:8px;"> Projects</a>
        <a href="tasks.html" class="active"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Tasks</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> View Site Reports</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header-row">
        <div class="page-header"><h1>Task Management</h1><p>Manage and track all project tasks</p></div>
        <button onclick="openAddTask()" class="btn btn-primary">+ New Task</button>
      </div>

      <div class="filter-bar">
        <input type="text" class="form-input" id="search-tasks" placeholder="Search tasks..." oninput="renderTasks()">
        <select class="form-select" id="filter-status" onchange="renderTasks()"><option value="">All Status</option><option>Pending</option><option>In Progress</option><option>Completed</option></select>
        <select class="form-select" id="filter-priority" onchange="renderTasks()"><option value="">All Priority</option><option>High</option><option>Medium</option><option>Low</option></select>
      </div>

      <div id="tasks-list"></div>
    </main>
  </div>
</div>

<!-- Add/Edit Task Modal -->
<div id="add-task-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div><h2 id="task-modal-title">Add New Task</h2><p>Assign a task to a site engineer.</p></div>
      <button class="modal-close" onclick="closeModal('add-task-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <input type="hidden" id="t-id">
    <div class="form-group"><label class="form-label">Task Title <span class="req">*</span></label><input id="t-title" class="form-input" placeholder="e.g., Foundation Inspection" data-required></div>
    <div class="form-group"><label class="form-label">Project <span class="req">*</span></label><select id="t-project" class="form-select" data-required><option value="">Select project</option></select></div>
    <div class="form-group"><label class="form-label">Assigned Site Engineer <span class="req">*</span></label><select id="t-engineer" class="form-select" data-required><option value="">Select engineer</option></select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date <span class="req">*</span></label><input id="t-start" type="date" class="form-input" data-required></div>
      <div class="form-group"><label class="form-label">Deadline <span class="req">*</span></label><input id="t-deadline" type="date" class="form-input" data-required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Priority <span class="req">*</span></label><select id="t-priority" class="form-select" data-required><option value="">Select priority</option><option>High</option><option>Medium</option><option>Low</option></select></div>
      <div class="form-group"><label class="form-label">Status <span class="req">*</span></label>
        <select id="t-status" class="form-select" data-required>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Progress (%)</label><input id="t-progress" type="number" class="form-input" min="0" max="100"></div>
    <div class="form-group"><label class="form-label">Task Description <span class="req">*</span></label><textarea id="t-desc" class="form-textarea" placeholder="Describe the task..." data-required></textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal('add-task-modal')" class="btn btn-secondary">Cancel</button>
      <button onclick="saveTask()" class="btn btn-primary" id="task-save-btn">✓ Assign Task</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['project_manager']);
  if (!user) return;
  renderNavbar(user);
  populateForm();
  renderTasks();
};

function populateForm() {
  const projects = getAll('projects').filter(p => p.managerId === user.id);
  const engineers = getAll('users').filter(u => u.role === 'site_engineer');
  const pSel = document.getElementById('t-project');
  const eSel = document.getElementById('t-engineer');
  pSel.innerHTML = '<option value="">Select project</option>';
  eSel.innerHTML = '<option value="">Select engineer</option>';
  projects.forEach(p => pSel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
  engineers.forEach(e => eSel.innerHTML += `<option value="${e.id}">${e.name}</option>`);
}

function renderTasks() {
  const myProjectIds = getAll('projects').filter(p => p.managerId === user.id).map(p => p.id);
  let tasks = getAll('tasks').filter(t => myProjectIds.includes(t.projectId));
  const q = document.getElementById('search-tasks').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  const pr = document.getElementById('filter-priority').value;
  if (q) tasks = tasks.filter(t => t.title.toLowerCase().includes(q) || t.projectName.toLowerCase().includes(q));
  if (st) tasks = tasks.filter(t => t.status === st);
  if (pr) tasks = tasks.filter(t => t.priority === pr);

  const el = document.getElementById('tasks-list');
  if (!tasks.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><h3>No tasks found</h3><p>Try adjusting your filters</p></div>'; return; }

  el.innerHTML = tasks.map(t => `
    <div class="task-card" onclick="window.location.href='task-detail.html?id=${t.id}'">
      <div class="task-card-header">
        <div style="display:flex;align-items:center;gap:8px"><strong class="task-card-title">${t.title}</strong>${priorityBadge(t.priority)}</div>
        ${statusBadge(t.status)}
      </div>
      <div class="task-card-meta">${t.projectName}</div>
      <div style="display:flex;align-items:center;gap:10px">${progressBar(t.progress)}<span class="task-pct">${t.progress}%</span></div>
      <div class="task-card-footer">
        <span><img src="../../icons/Icon (1).svg" width="14" height="14" style="vertical-align:middle;margin-right:6px"> ${t.assignedName}</span>
        <span><img src="../../icons/CheckCircle2.svg" width="14" height="14" style="vertical-align:middle;margin-right:6px"> ${formatDate(t.deadline)}</span>
        <div class="actions" onclick="event.stopPropagation()">
          <button onclick="editTask('${t.id}')" class="btn btn-secondary btn-sm">Edit</button>
          <button onclick="deleteTask('${t.id}')" class="btn btn-danger btn-sm">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function openAddTask() {
  document.getElementById('task-modal-title').textContent = 'Add New Task';
  document.getElementById('task-save-btn').textContent = '✓ Assign Task';
  document.getElementById('t-id').value = '';
  ['t-title','t-project','t-engineer','t-priority','t-start','t-deadline','t-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('t-status').value = 'Pending';
  document.getElementById('t-progress').value = '0';
  document.getElementById('t-status').parentElement.style.display = 'none';
  document.getElementById('t-progress').parentElement.style.display = 'none';
  openModal('add-task-modal');
}

function editTask(id) {
  const t = getById('tasks', id);
  if (!t) return;
  document.getElementById('task-modal-title').textContent = 'Edit Task';
  document.getElementById('task-save-btn').textContent = '✓ Save Changes';
  document.getElementById('t-id').value = t.id;
  document.getElementById('t-title').value = t.title;
  document.getElementById('t-project').value = t.projectId;
  document.getElementById('t-engineer').value = t.assignedTo;
  document.getElementById('t-priority').value = t.priority;
  document.getElementById('t-start').value = t.startDate;
  document.getElementById('t-deadline').value = t.deadline;
  document.getElementById('t-desc').value = t.description;
  document.getElementById('t-status').value = t.status || 'Pending';
  document.getElementById('t-progress').value = t.progress || 0;
  document.getElementById('t-status').parentElement.style.display = 'block';
  document.getElementById('t-progress').parentElement.style.display = 'block';
  openModal('add-task-modal');
}

function deleteTask(id) {
  confirmAction('Delete this task? This cannot be undone.', () => {
    remove('tasks', id);
    showToast('Task deleted.', 'info');
    renderTasks();
  });
}

function saveTask() {
  const fields = ['t-title','t-project','t-engineer','t-priority','t-start','t-deadline','t-desc'];
  let valid = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    clearError(el);
    if (!el.value.trim()) { showError(el, 'This field is required'); valid = false; }
  });
  const s = document.getElementById('t-start').value, d = document.getElementById('t-deadline').value;
  const progressEl = document.getElementById('t-progress');
  const statusEl = document.getElementById('t-status');
  if (s && d && d < s) { showError(document.getElementById('t-deadline'), 'Deadline must be after start date'); valid = false; }
  if (document.getElementById('t-id').value) {
    clearError(progressEl);
    const progressValue = Number(progressEl.value);
    if (progressEl.value !== '' && (Number.isNaN(progressValue) || progressValue < 0 || progressValue > 100)) {
      showError(progressEl, 'Progress must be between 0 and 100');
      valid = false;
    }
    if (statusEl.value === 'Completed' && progressValue !== 100) {
      showError(statusEl, 'Progress is not 100. Complete task first.');
      valid = false;
    }
  }
  if (!valid) return;

  const id = document.getElementById('t-id').value;
  const pId = document.getElementById('t-project').value;
  const proj = getById('projects', pId);
  const eId = document.getElementById('t-engineer').value;
  const eng = getById('users', eId);

  const taskData = {
    title: document.getElementById('t-title').value.trim(),
    projectId: pId, projectName: proj ? proj.name : '',
    assignedTo: eId, assignedName: eng ? eng.name : '',
    priority: document.getElementById('t-priority').value,
    startDate: document.getElementById('t-start').value,
    deadline: document.getElementById('t-deadline').value,
    description: document.getElementById('t-desc').value.trim()
  };

  if (id) {
    taskData.status = statusEl.value;
    taskData.progress = Number(progressEl.value) || 0;
    update('tasks', id, taskData);
    showToast('Task updated!');
  } else {
    create('tasks', { id: genId('T'), status: 'Pending', progress: 0, remarks: '', ...taskData });
    create('notifications', {
      id: genId('N'), userId: eId, type: 'task', title: 'New Task Assigned',
      body: `You have been assigned to: ${taskData.title} for ${taskData.projectName}.`, time: 'just now', read: false
    });
    showToast('Task assigned!');
  }
  closeModal('add-task-modal');
  renderTasks();
}
</script>
</body>
</html>
