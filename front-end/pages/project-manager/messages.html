<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Messages – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html" ><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="projects.html"><img src="../../icons/Icon (2).svg" class="nav-icon" width="18" height="18" alt="📁" style="vertical-align:middle;margin-right:8px;"> Projects</a>
        <a href="tasks.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Tasks</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> View Site Reports</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages <span class="badge-count">3</span></a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content" style="padding-bottom:0">
      <div class="page-header"><h1>Messages</h1><p>Communicate with your team members</p></div>
      <div class="chat-layout">
        <div class="chat-sidebar">
          <div class="chat-sidebar-header">
            <input type="text" class="chat-search" placeholder="Search conversations..." id="conv-search" oninput="filterConversations()">
          </div>
          <div class="chat-list" id="conv-list"></div>
        </div>
        <div class="chat-main" id="chat-main">
          <div class="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div class="empty-icon">💬</div>
            <h3>Select a conversation</h3>
            <p>Choose a contact to start chatting</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user, activeContact = null;

const SIDEBAR_MAP = {
  project_manager: [
    {href:'dashboard.html',icon:'🏠',label:'Dashboard'},{href:'projects.html',icon:'📁',label:'Projects'},
    {href:'tasks.html',icon:'✅',label:'Tasks'},
    {href:'reports.html',icon:'📋',label:'View Site Reports'},{href:'messages.html',icon:'💬',label:'Messages',active:true},
    {href:'settings.html',icon:'⚙️',label:'Settings'}
  ],
  site_engineer: [
    {href:'dashboard.html',icon:'🏠',label:'Dashboard'},{href:'my-tasks.html',icon:'✅',label:'My Tasks'},
    {href:'update-task.html',icon:'<img src="../../icons/Edit.svg" alt="📝" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline">',label:'Update Task Status'},{href:'submit-report.html',icon:'📋',label:'Submit Site Report'},
    {href:'messages.html',icon:'💬',label:'Messages',active:true},{href:'settings.html',icon:'⚙️',label:'Settings'}
  ],
  finance_manager: [
    {href:'dashboard.html',icon:'🏠',label:'Dashboard'},{href:'project-budget.html',icon:'💵',label:'Project Budget'},
    {href:'expenses.html',icon:'💸',label:'Expenses'},{href:'generate-bills.html',icon:'📄',label:'Generate Bills'},
    {href:'bill-decisions.html',icon:'✅',label:'Bill Payment Decisions'},{href:'messages.html',icon:'💬',label:'Messages',active:true},
    {href:'settings.html',icon:'⚙️',label:'Settings'}
  ],
  client: [
    {href:'dashboard.html',icon:'🏠',label:'Dashboard'},{href:'pending-bills.html',icon:'💵',label:'Pending Bills'},
    {href:'messages.html',icon:'<img src="../../icons/Send.svg" alt="📩" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline">',label:'Messages',active:true},{href:'settings.html',icon:'⚙️',label:'Settings'}
  ]
};

window.onload = () => {
  initDB();
  user = requireAuth(['project_manager','site_engineer','finance_manager','client','superuser']);
  if (!user) return;
  renderNavbar(user);
  renderConversations();
};

function renderSidebar() {
  const links = SIDEBAR_MAP[user.role] || [];
  document.getElementById('sidebar').innerHTML = `<nav class="sidebar-nav">${links.map(l=>`<a href="${l.href}" class="${l.active?'active':''}"><span class="nav-icon">${l.icon}</span> ${l.label}</a>`).join('')}</nav>`;
}

function getContacts() {
  const users = getAll('users').filter(u => u.id !== user.id && u.status === 'active');
  return users;
}

function renderConversations() {
  const contacts = getContacts();
  const msgs = loadDB() ? (JSON.parse(sessionStorage.getItem('ch_db')).messages || []) : [];
  document.getElementById('conv-list').innerHTML = contacts.map(c => {
    const lastMsg = msgs.filter(m => (m.from===user.id&&m.to===c.id)||(m.from===c.id&&m.to===user.id)).slice(-1)[0];
    return `<div class="chat-item ${activeContact===c.id?'active':''}" onclick="openChat('${c.id}')">
      ${avatarEl(c.avatar||c.name.substring(0,2).toUpperCase(), 36)}
      <div class="chat-item-info">
        <strong>${c.name}</strong>
        <span>${lastMsg ? lastMsg.text : roleLabel(c.role)}</span>
      </div>
    </div>`;
  }).join('');
}

function filterConversations() {
  const q = document.getElementById('conv-search').value.toLowerCase();
  document.querySelectorAll('.chat-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function openChat(contactId) {
  activeContact = contactId;
  const contact = getAll('users').find(u => u.id === contactId);
  if (!contact) return;
  renderConversations();

  const dbData = JSON.parse(sessionStorage.getItem('ch_db') || '{}');
  const msgs = (dbData.messages || []).filter(m =>
    (m.from===user.id && m.to===contactId) || (m.from===contactId && m.to===user.id)
  );

  document.getElementById('chat-main').innerHTML = `
    <div class="chat-header">
      ${avatarEl(contact.avatar||contact.name.substring(0,2).toUpperCase(), 40)}
      <div><strong style="display:block">${contact.name}</strong><span style="font-size:12px;color:var(--green)">● Online</span></div>
    </div>
    <div class="chat-messages" id="msgs-container">
      ${msgs.map(m => `
        <div>
          <div class="msg-bubble ${m.from===user.id?'msg-out':'msg-in'}">${m.text}</div>
          <div class="msg-time" style="text-align:${m.from===user.id?'right':'left'}">${m.time}</div>
        </div>`).join('')}
    </div>
    <div class="chat-input-row">
      <input type="text" class="chat-input" id="msg-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMsg('${contactId}')">
      <button onclick="sendMsg('${contactId}')" class="btn btn-primary btn-sm" style="border-radius:50%;width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center">→</button>
    </div>`;

  const container = document.getElementById('msgs-container');
  if (container) container.scrollTop = container.scrollHeight;
}

function sendMsg(toId) {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  const contact = getAll('users').find(u => u.id === toId);
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});

  const msg = { id: genId('M'), from: user.id, fromName: user.name, to: toId, toName: contact?contact.name:'', text, time, date: now.toISOString().split('T')[0] };

  const dbData = JSON.parse(sessionStorage.getItem('ch_db') || '{}');
  dbData.messages = dbData.messages || [];
  dbData.messages.push(msg);
  sessionStorage.setItem('ch_db', JSON.stringify(dbData));

  input.value = '';
  openChat(toId);
}
</script>
</body>
</html>
