<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feedback – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-progress.html"><span class="nav-icon"><img src="../../icons/TrendingUp.svg" alt="📊" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Project Details</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> Reports</a>
        <a href="pending-bills.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💵" style="vertical-align:middle;margin-right:8px;"> Pending Bills</a>
        <a href="payment-decisions.html"><span class="nav-icon">💳</span> Payment Decisions</a>
        <a href="feedback.html" class="active"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Feedback</a>
        <a href="messages.html"><span class="nav-icon"><img src="../../icons/Send.svg" alt="📩" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Messages</a>
        
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="back-btn" onclick="history.back()">← Back</div>
      <div class="page-header"><h1>Feedback</h1><p>Provide feedback to the project team</p></div>
      <div style="max-width:600px">
        <div class="card">
          <div class="form-group"><label class="form-label">Project <span class="req">*</span></label><select id="f-project" class="form-select" data-required><option value="">Select project</option></select></div>
          <div class="form-group"><label class="form-label">Feedback Category <span class="req">*</span></label>
            <select id="f-cat" class="form-select" data-required>
              <option value="">Select category</option>
              <option>Quality of Work</option><option>Timeline</option><option>Communication</option><option>Budget</option><option>Safety</option><option>General</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Subject <span class="req">*</span></label><input id="f-subject" class="form-input" placeholder="Brief subject line" data-required data-maxlen="100"></div>
          <div class="form-group"><label class="form-label">Message <span class="req">*</span></label><textarea id="f-msg" class="form-textarea" placeholder="Share your feedback..." style="min-height:120px" data-required data-maxlen="1000"></textarea></div>
          <div class="form-group"><label class="form-label">Priority</label>
            <select id="f-priority" class="form-select"><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option></select>
          </div>
          <button onclick="submitFeedback()" class="btn btn-primary btn-full" style="padding:12px">Submit Feedback</button>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Success Modal -->
<div id="success-modal" class="modal-overlay">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <div style="width:60px;height:60px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✅</div>
    <h2 style="font-family:var(--font-head);margin-bottom:8px">Feedback Submitted Successfully!</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px">Your feedback has been shared with the project team.</p>
    <button onclick="closeModal('success-modal');window.location.href='dashboard.html'" class="btn btn-success btn-full">Go back</button>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['client']);
  if (!user) return;
  renderNavbar(user);
  const sel = document.getElementById('f-project');
  getAll('projects').filter(p => p.clientId === user.id).forEach(p => sel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
};

function submitFeedback() {
  const fields = ['f-project','f-cat','f-subject','f-msg'];
  let valid = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    clearError(el);
    if (!el.value.trim()) { showError(el, 'This field is required'); valid = false; }
  });
  const msg = document.getElementById('f-msg').value;
  if (msg.length > 1000) { showError(document.getElementById('f-msg'), 'Max 1000 characters'); valid = false; }
  if (!valid) return;

  const projectId = document.getElementById('f-project').value;
  const project = getById('projects', projectId);
  if (!project) {
    showToast('Selected project not found', 'warning');
    return;
  }

  create('notifications', {
    id: genId('N'),
    userId: project.managerId,
    type: 'feedback',
    title: 'Client Feedback',
    body: msg.trim(),
    clientId: user.id,
    clientName: user.name,
    projectId: project.id,
    projectName: project.name,
    category: document.getElementById('f-cat').value,
    subject: document.getElementById('f-subject').value.trim(),
    priority: document.getElementById('f-priority').value,
    createdAt: new Date().toISOString(),
    time: 'just now',
    read: false
  });

  ['f-project','f-cat','f-subject','f-msg'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-priority').value = 'Low';
  openModal('success-modal');
}
</script>
</body>
</html>
