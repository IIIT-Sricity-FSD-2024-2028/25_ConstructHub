<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reports – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-progress.html"><span class="nav-icon"><img src="../../icons/TrendingUp.svg" alt="📊" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Project Details</a>
        <a href="reports.html" class="active"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> Reports</a>
        <a href="pending-bills.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💵" style="vertical-align:middle;margin-right:8px;"> Pending Bills</a>
        <a href="payment-decisions.html"><span class="nav-icon">💳</span> Payment Decisions</a>
        <a href="feedback.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Feedback</a>
        <a href="messages.html"><span class="nav-icon"><img src="../../icons/Send.svg" alt="📩" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Messages</a>
        
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="back-btn" onclick="history.back()">← Back</div>
      <div class="page-header"><h1>Reports</h1><p>View site reports and construction progress</p></div>
      <div id="reports-list"></div>
    </main>
  </div>
</div>
<div id="report-modal" class="modal-overlay">
  <div class="modal-box modal-lg">
    <div class="modal-header"><div><h2 id="r-title"></h2><p id="r-sub"></p></div><button class="modal-close" onclick="closeModal('report-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button></div>
    <div id="r-content"></div>
    <div class="modal-footer"><button onclick="closeModal('report-modal')" class="btn btn-secondary">Close</button></div>
  </div>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['client']);
  if (!user) return;
  renderNavbar(user);
  const myProjectIds = getAll('projects').filter(p => p.clientId === user.id).map(p => p.id);
  const reports = getAll('reports').filter(r => myProjectIds.includes(r.projectId));
  const el = document.getElementById('reports-list');
  el.innerHTML = reports.map(r=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:10px">
          <div style="background:var(--primary-light);padding:10px;border-radius:8px;font-size:18px;flex-shrink:0">📄</div>
          <div><strong>${r.title}</strong><div style="font-size:12px;color:var(--text-muted)">${r.projectName} · ${formatDate(r.date)}</div></div>
        </div>
        <a href="report-detail.html?id=${r.id}" class="btn btn-secondary btn-sm">View Details</a>
      </div>
    </div>`).join('') || '<div class="empty-state"><p>No reports available</p></div>';
};
function viewReport(id) {
  const r = getById('reports', id);
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-sub').textContent = r.projectName + ' · ' + formatDate(r.date);
  document.getElementById('r-content').innerHTML = `<div class="detail-grid"><div class="detail-item"><label>Submitted By</label><span>${r.submittedName}</span></div><div class="detail-item"><label>Progress</label><span>${r.progress}%</span></div><div class="detail-item"><label>Status</label><span>${statusBadge(r.status)}</span></div></div><div class="divider"></div><p style="font-size:13.5px;color:var(--text-muted)">${r.workDone}</p>`;
  openModal('report-modal');
}
</script>
</body>
</html>
