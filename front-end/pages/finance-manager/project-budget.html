<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Budget - ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="Dashboard" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-budget.html" class="active"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="Project Budget" style="vertical-align:middle;margin-right:8px;"> Project Budget</a>
        <a href="expenses.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="Expenses" style="vertical-align:middle;margin-right:8px;"> Expenses</a>
        <a href="generate-bills.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="Generate Bills" style="vertical-align:middle;margin-right:8px;"> Generate Bills</a>
        <a href="bill-decisions.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="Bill Payment Decisions" style="vertical-align:middle;margin-right:8px;"> Bill Payment Decisions</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="Messages" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="Settings" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Project Budgets</h1><p>Monitor budget allocation and expenses across all projects</p></div>
      <div id="budgets-list"></div>
    </main>
  </div>
</div>

<div id="budget-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div><h2>Edit Budget</h2><p id="budget-proj-name"></p></div>
      <button class="modal-close" onclick="closeModal('budget-modal')"><img src="../../icons/X.svg" alt="Close" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <input type="hidden" id="b-proj-id">
    <div class="form-group"><label class="form-label">Total Budget (Rs) <span class="req">*</span></label><input id="b-total" type="number" class="form-input" data-required data-min="1"></div>
    <div class="form-group"><label class="form-label">Allocated for Labor (Rs)</label><input id="b-labor" type="number" class="form-input" min="0"></div>
    <div class="form-group"><label class="form-label">Allocated for Materials (Rs)</label><input id="b-materials" type="number" class="form-input" min="0"></div>
    <div class="form-group"><label class="form-label">Allocated for Equipment (Rs)</label><input id="b-equipment" type="number" class="form-input" min="0"></div>
    <div class="form-group"><label class="form-label">Allocated for Other (Rs)</label><input id="b-other" type="number" class="form-input" min="0"></div>
    <div class="modal-footer">
      <button onclick="closeModal('budget-modal')" class="btn btn-secondary">Cancel</button>
      <button onclick="saveBudget()" class="btn btn-primary">Save Budget</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
const BUDGET_CATEGORIES = [
  { name: 'Labor', icon: '<img src="../../icons/HardHat.svg" alt="Labor" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline">' },
  { name: 'Materials', icon: 'Materials' },
  { name: 'Equipment', icon: '<img src="../../icons/Wrench.svg" alt="Equipment" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline">' },
  { name: 'Other', icon: '<img src="../../icons/Package.svg" alt="Other" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline">' }
];

window.onload = () => {
  initDB();
  user = requireAuth(['finance_manager']);
  if (!user) return;
  renderNavbar(user);
  attachBudgetValidation();
  syncAllProjectSpent();
  renderBudgets();
};

function sanitizeBudgetNumberInput(input, allowZero = true) {
  input.addEventListener('input', () => {
    const rawValue = input.value;
    if (rawValue === '') return;

    const numericValue = Number(rawValue);
    if (Number.isNaN(numericValue)) {
      input.value = '';
      return;
    }

    const minValue = allowZero ? 0 : 1;
    if (numericValue < minValue) {
      input.value = String(minValue);
    }
  });
}

function attachBudgetValidation() {
  sanitizeBudgetNumberInput(document.getElementById('b-total'), false);
  ['b-labor', 'b-materials', 'b-equipment', 'b-other'].forEach(fieldId => {
    sanitizeBudgetNumberInput(document.getElementById(fieldId), true);
  });
}

function getProjectAllocations(project) {
  const allocations = project.allocations || {};
  return {
    Labor: Number(allocations.Labor) || 0,
    Materials: Number(allocations.Materials) || 0,
    Equipment: Number(allocations.Equipment) || 0,
    Other: Number(allocations.Other) || 0
  };
}

function getCategorySpent(projectId) {
  const totals = { Labor: 0, Materials: 0, Equipment: 0, Other: 0 };
  getAll('expenses')
    .filter(expense => expense.projectId === projectId)
    .forEach(expense => {
      const category = Object.prototype.hasOwnProperty.call(totals, expense.category) ? expense.category : 'Other';
      totals[category] += Number(expense.amount) || 0;
    });
  return totals;
}

function getProjectSpent(projectId) {
  return getAll('expenses')
    .filter(expense => expense.projectId === projectId)
    .reduce((sum, expense) => sum + (Number(expense.amount) || 0), 0);
}

function syncAllProjectSpent() {
  getAll('projects').forEach(project => {
    update('projects', project.id, { spent: getProjectSpent(project.id) });
  });
}

function renderBudgets() {
  const projects = getAll('projects');
  const el = document.getElementById('budgets-list');
  el.innerHTML = projects.map(project => {
    const budget = Number(project.budget) || 0;
    const spent = Number(project.spent) || 0;
    const utilization = budget > 0 ? Math.round((spent / budget) * 100) : 0;
    const remaining = budget - spent;
    const statusColor = utilization > 85 ? 'var(--red)' : utilization > 70 ? 'var(--orange)' : 'var(--green)';
    const allocations = getProjectAllocations(project);
    const spentByCategory = getCategorySpent(project.id);
    const categories = BUDGET_CATEGORIES.map(category => ({
      name: category.name,
      icon: category.icon,
      allocated: allocations[category.name],
      spent: spentByCategory[category.name]
    }));

    return `
      <div class="card" style="margin-bottom:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div>
            <h3 style="font-family:var(--font-head);font-weight:700;font-size:17px">${project.name}</h3>
            <div style="font-size:12.5px;color:var(--text-muted)">Total Budget: ${formatCurrency(budget)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${statusBadge(project.status)}
            <button onclick="editBudget('${project.id}')" class="btn btn-secondary btn-sm"><img src="../../icons/Edit.svg" alt="Edit" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> Edit Budget</button>
          </div>
        </div>

        <div class="grid-4" style="margin-bottom:16px">
          <div style="background:var(--bg);border-radius:10px;padding:12px">
            <div style="font-size:11px;color:var(--primary);font-weight:700;text-transform:uppercase">Budget Allocation</div>
            <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px">${formatCurrency(budget)}</div>
          </div>
          <div style="background:var(--bg);border-radius:10px;padding:12px">
            <div style="font-size:11px;color:var(--red);font-weight:700;text-transform:uppercase"><img src="../../icons/TrendingDown.svg" alt="Expenses" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> Total Expenses</div>
            <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px">${formatCurrency(spent)}</div>
          </div>
          <div style="background:var(--bg);border-radius:10px;padding:12px">
            <div style="font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase"><img src="../../icons/DollarSign.svg" alt="Remaining" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> Remaining</div>
            <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px;color:var(--green)">${formatCurrency(remaining)}</div>
          </div>
          <div style="background:var(--bg);border-radius:10px;padding:12px">
            <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase"><img src="../../icons/TrendingUp.svg" alt="Usage" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> Budget Usage</div>
            <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px;color:${statusColor}">${utilization}%</div>
          </div>
        </div>

        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12.5px"><span>Budget Utilization</span><strong>${utilization}%</strong></div>
          ${progressBar(utilization, statusColor)}
        </div>

        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Budget Breakdown by Category</div>
        <div class="grid-4">
          ${categories.map(category => `
            <div style="background:var(--bg);border-radius:10px;padding:12px">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px">${category.icon} ${category.name}</div>
              <div style="font-size:11.5px;color:var(--text-muted)">Allocated</div>
              <div style="font-weight:700;font-size:13px">${formatCurrency(category.allocated)}</div>
              <div style="font-size:11.5px;color:var(--red);margin-top:4px">Spent</div>
              <div style="font-weight:700;font-size:13px;color:var(--red)">${formatCurrency(category.spent)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function editBudget(projectId) {
  const project = getById('projects', projectId);
  const allocations = getProjectAllocations(project);
  document.getElementById('b-proj-id').value = projectId;
  document.getElementById('budget-proj-name').textContent = project.name;
  document.getElementById('b-total').value = Number(project.budget) || 0;
  document.getElementById('b-labor').value = allocations.Labor;
  document.getElementById('b-materials').value = allocations.Materials;
  document.getElementById('b-equipment').value = allocations.Equipment;
  document.getElementById('b-other').value = allocations.Other;
  openModal('budget-modal');
}

function saveBudget() {
  const totalEl = document.getElementById('b-total');
  const laborEl = document.getElementById('b-labor');
  const materialsEl = document.getElementById('b-materials');
  const equipmentEl = document.getElementById('b-equipment');
  const otherEl = document.getElementById('b-other');
  const total = Number(totalEl.value);
  const labor = Number(laborEl.value) || 0;
  const materials = Number(materialsEl.value) || 0;
  const equipment = Number(equipmentEl.value) || 0;
  const other = Number(otherEl.value) || 0;
  const allocatedTotal = labor + materials + equipment + other;

  clearError(totalEl);
  [laborEl, materialsEl, equipmentEl, otherEl].forEach(clearError);
  if (!total || total <= 0) {
    showError(totalEl, 'Valid budget required');
    return;
  }
  if (labor < 0) {
    showError(laborEl, 'Allocation cannot be negative');
    return;
  }
  if (materials < 0) {
    showError(materialsEl, 'Allocation cannot be negative');
    return;
  }
  if (equipment < 0) {
    showError(equipmentEl, 'Allocation cannot be negative');
    return;
  }
  if (other < 0) {
    showError(otherEl, 'Allocation cannot be negative');
    return;
  }
  if (allocatedTotal > total) {
    showError(totalEl, 'Category allocations cannot exceed total budget');
    return;
  }

  const projectId = document.getElementById('b-proj-id').value;
  update('projects', projectId, {
    budget: total,
    allocations: {
      Labor: labor,
      Materials: materials,
      Equipment: equipment,
      Other: other
    }
  });
  closeModal('budget-modal');
  showToast('Budget updated!');
  renderBudgets();
}
</script>
</body>
</html>
