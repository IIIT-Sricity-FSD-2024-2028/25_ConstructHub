<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Manager Dashboard – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-budget.html"><span class="nav-icon"><img src="../../icons/DollarSign.svg" alt="💲" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Project Budget</a>
        <a href="expenses.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💸" style="vertical-align:middle;margin-right:8px;"> Expenses</a>
        <a href="generate-bills.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📄" style="vertical-align:middle;margin-right:8px;"> Generate Bills</a>
        <a href="bill-decisions.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Bill Payment Decisions</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages <span class="badge-count">7</span></a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Finance Manager Dashboard</h1><p>Monitor budgets, expenses, and financial operations</p></div>
      <div class="stats-grid" id="stats-grid"></div>
      <div style="margin-bottom:20px">
        <div class="card"><div class="card-title">Budget Breakdown</div><div id="chart-breakdown" style="min-height:180px;display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap"></div></div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="section-header"><div class="section-title">Pending Payment Approvals</div><span class="badge badge-red" id="pending-badge"></span></div>
        <div id="pending-bills"></div>
      </div>
      <div class="card">
        <div class="section-header"><div class="section-title">Recent Expenses</div><a href="expenses.html" class="btn btn-secondary btn-sm">View All</a></div>
        <div class="table-wrap"><table class="data-table"><thead><tr><th>Expense ID</th><th>Project</th><th>Category</th><th>Amount</th><th>Date</th></tr></thead><tbody id="recent-expenses-tbody"></tbody></table></div>
      </div>
    </main>
  </div>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['finance_manager']);
  if (!user) return;
  renderNavbar(user);
  renderStats(); renderCharts(); renderPendingBills(); renderRecentExpenses();
};

function renderStats() {
  const projects = getAll('projects');
  const bills = getAll('bills');
  const expenses = getAll('expenses') || [];
  
  const totalBudget = projects.reduce((s,p) => s + p.budget, 0);
  const utilized = projects.reduce((s,p) => {
    const pBills = bills.filter(b => b.projectId === p.id && b.status === 'Approved').reduce((sum, b) => sum + b.amount, 0);
    const pExp = expenses.filter(e => e.projectId === p.id).reduce((sum, e) => sum + e.amount, 0);
    return s + pBills + pExp;
  }, 0);
  const percentUtilized = totalBudget ? Math.round((utilized/totalBudget)*100) : 0;

  const pending = bills.filter(b => b.status === 'Pending').length;
  const overdue = bills.filter(b => b.status === 'Pending' && b.dueDate && new Date(b.dueDate) < new Date()).length;
  
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-icon"><img src="../../icons/DollarSign.svg" alt="💰" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value" style="font-size:20px">${formatCurrency(totalBudget)}</div><div class="stat-label">Total Budget</div></div>
    <div class="stat-card"><div class="stat-icon"><img src="../../icons/TrendingUp.svg" alt="📈" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value" style="font-size:20px">${formatCurrency(utilized)}</div><div class="stat-label">Utilized</div></div>
    <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-value">${pending}</div><div class="stat-label">Pending Invoices</div></div>
    <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value">${overdue}</div><div class="stat-label">Overdue Payments</div></div>`;
}

function renderCharts() {
  const expenses = getAll('expenses') || [];
  
  // Dynamic breakdown categorizing into Labor, Materials, Equipment, and Other
  let brk = { Labor:0, Materials:0, Equipment:0, Other:0 };
  expenses.forEach(e => {
    if (brk[e.category] !== undefined) brk[e.category] += e.amount;
    else brk.Other += e.amount;
  });
  
  const totalUsed = Object.values(brk).reduce((s, v) => s + v, 0);
  let pL = 0, pM = 0, pE = 0, pO = 0;
  if(totalUsed > 0) {
    pL = Math.round((brk.Labor / totalUsed) * 100);
    pM = Math.round((brk.Materials / totalUsed) * 100);
    pE = Math.round((brk.Equipment / totalUsed) * 100);
    pO = Math.round((brk.Other / totalUsed) * 100);
  }

  document.getElementById('chart-breakdown').innerHTML = totalUsed === 0 ? '<div class="empty-state" style="width:100%"><p>No expenses logged</p></div>' : `
    <svg width="130" height="130" viewBox="0 0 36 36" style="transform:rotate(-90deg)">
      <circle cx="18" cy="18" r="15.9155" fill="transparent" stroke="#e5e7eb" stroke-width="3.5"/>
      ${pL>0 ? `<circle cx="18" cy="18" r="15.9155" fill="transparent" stroke="#f97316" stroke-width="3.5" stroke-dasharray="${pL} ${100-pL}" stroke-dashoffset="0"/>` : ''}
      ${pM>0 ? `<circle cx="18" cy="18" r="15.9155" fill="transparent" stroke="#3b82f6" stroke-width="3.5" stroke-dasharray="${pM} ${100-pM}" stroke-dashoffset="-${pL}"/>` : ''}
      ${pE>0 ? `<circle cx="18" cy="18" r="15.9155" fill="transparent" stroke="#10b981" stroke-width="3.5" stroke-dasharray="${pE} ${100-pE}" stroke-dashoffset="-${pL+pM}"/>` : ''}
      ${pO>0 ? `<circle cx="18" cy="18" r="15.9155" fill="transparent" stroke="#f59e0b" stroke-width="3.5" stroke-dasharray="${pO} ${100-pO}" stroke-dashoffset="-${pL+pM+pE}"/>` : ''}
    </svg>
    <div style="display:flex;flex-direction:column;gap:7px">
      <div style="font-size:12px;display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:#f97316"></div>Labor ${pL}%</div>
      <div style="font-size:12px;display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:#3b82f6"></div>Materials ${pM}%</div>
      <div style="font-size:12px;display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:#10b981"></div>Equipment ${pE}%</div>
      <div style="font-size:12px;display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:2px;background:#f59e0b"></div>Other ${pO}%</div>
    </div>`;
}

function renderPendingBills() {
  const bills = getAll('bills').filter(b => b.status === 'Pending');
  document.getElementById('pending-badge').textContent = bills.length + ' Pending';
  const el = document.getElementById('pending-bills');
  if (!bills.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>No pending payment approvals</p></div>'; return; }
  el.innerHTML = bills.map(b => `
    <div style="background:var(--bg);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div><strong>${b.id}</strong> ${priorityBadge('High')}<div style="font-size:12px;color:var(--text-muted);margin-top:2px">${b.clientName} · ${b.projectName}</div></div>
        <div style="text-align:right"><div style="font-family:var(--font-head);font-size:18px;font-weight:800;color:var(--primary)">${formatCurrency(b.amount)}</div><div style="font-size:11px;color:var(--text-muted)">Due: ${formatDate(b.dueDate)}</div></div>
      </div>
      <a href="bill-detail.html?id=${b.id}" class="btn btn-secondary btn-sm">View Bill Details</a>
    </div>`).join('');
}

function renderRecentExpenses() {
  const projects = getAll('projects') || [];
  const expenses = (getAll('expenses') || [])
    .slice()
    .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0))
    .slice(0, 5);

  const el = document.getElementById('recent-expenses-tbody');
  if (expenses.length === 0) {
    el.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No recent expenses</p></div></td></tr>';
    return;
  }

  el.innerHTML = expenses.map(expense => {
    const project = projects.find(projectItem => projectItem.id === expense.projectId);
    return `
    <tr>
      <td><strong>${expense.id}</strong></td>
      <td>${project ? project.name : (expense.projectName || 'N/A')}</td>
      <td>${expense.category || 'Other'}</td>
      <td><strong>${formatCurrency(expense.amount)}</strong></td>
      <td>${formatDate(expense.date)}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
