<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Details – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="projects.html" class="active"><img src="../../icons/Icon (2).svg" class="nav-icon" width="18" height="18" alt="📁" style="vertical-align:middle;margin-right:8px;"> Projects</a>
        <a href="tasks.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Tasks</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> View Site Reports</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="back-btn" onclick="history.back()">← Back to Projects</div>
      <div id="project-content"></div>
    </main>
  </div>
</div>

<!-- Edit Project Modal -->
<div id="edit-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div><h2>Edit Project</h2><p>Update project information</p></div>
      <button class="modal-close" onclick="closeModal('edit-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <div class="form-group"><label class="form-label">Project Name <span class="req">*</span></label><input id="e-name" class="form-input" data-required></div>
    <div class="form-group"><label class="form-label">Location <span class="req">*</span></label><input id="e-location" class="form-input" data-required></div>
    <div class="form-group"><label class="form-label">Status</label>
      <select id="e-status" class="form-select"><option>On Track</option><option>At Risk</option><option>Delayed</option><option>Completed</option></select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date</label><input id="e-start" type="date" class="form-input"></div>
      <div class="form-group"><label class="form-label">End Date</label><input id="e-end" type="date" class="form-input"></div>
    </div>
    <div class="form-group"><label class="form-label">Budget (₹) <span class="req">*</span></label><input id="e-budget" type="number" class="form-input" data-required data-min="1"></div>
    <div class="form-group"><label class="form-label">Progress (%)</label><input id="e-progress" type="number" class="form-input" min="0" max="100"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea id="e-desc" class="form-textarea"></textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal('edit-modal')" class="btn btn-secondary">Cancel</button>
      <button onclick="saveProject()" class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user, project;

window.onload = () => {
  initDB();
  user = requireAuth(['project_manager', 'superuser']);
  if (!user) return;
  renderNavbar(user);
  const id = new URLSearchParams(window.location.search).get('id');
  project = getById('projects', id);
  if (!project) {
    document.getElementById('project-content').innerHTML = '<div class="empty-state"><div class="empty-icon">📁</div><h3>Project not found</h3></div>';
    return;
  }
  renderContent();
};

window.addEventListener('focus', () => {
  if (user && project) {
    project = getById('projects', project.id);
    if (project) renderContent();
  }
});

function renderContent() {
  project = getById('projects', project.id);
  const tasks = getAll('tasks').filter(t => t.projectId === project.id);
  const reports = getAll('reports').filter(r => r.projectId === project.id);
  const completedTasks = tasks.filter(t => t.status === 'Completed').length;
  const inProgressTasks = tasks.filter(t => t.status === 'In Progress').length;

  document.getElementById('project-content').innerHTML = `
    <div class="page-header-row">
      <div>
        <h1 style="font-family:var(--font-head);font-size:26px;font-weight:700">${project.name}</h1>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <span style="color:var(--text-muted);font-size:13px"><img src="../../icons/Package.svg" alt="📍" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${project.location}</span>
          ${statusBadge(project.status)}
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button onclick="openEdit()" class="btn btn-secondary"><img src="../../icons/Edit.svg" alt="✏" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline">️ Edit Project</button>
        <button onclick="window.location.href='tasks.html'" class="btn btn-primary">+ Add Task</button>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="stat-card">
        <div class="stat-icon"><img src="../../icons/TrendingUp.svg" alt="📈" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div>
        <div class="stat-value">${project.progress}%</div>
        <div class="stat-label">Overall Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${completedTasks}/${tasks.length}</div>
        <div class="stat-label">Tasks Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><img src="../../icons/DollarSign.svg" alt="💰" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div>
        <div class="stat-value" style="font-size:18px">${formatCurrency(project.budget)}</div>
        <div class="stat-label">Total Budget</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💸</div>
        <div class="stat-value" style="font-size:18px">${formatCurrency(project.spent)}</div>
        <div class="stat-label">Amount Spent</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <!-- Project Info -->
      <div class="detail-section">
        <h3>Project Information</h3>
        <div class="detail-grid">
          <div class="detail-item"><label>Project ID</label><span>${project.id}</span></div>
          <div class="detail-item"><label>Client</label><span>${project.clientName || '—'}</span></div>
          <div class="detail-item"><label>Location</label><span>${project.location}</span></div>
          <div class="detail-item"><label>Team Size</label><span>${project.teamSize} members</span></div>
          <div class="detail-item"><label>Start Date</label><span>${formatDate(project.startDate)}</span></div>
          <div class="detail-item"><label>End Date</label><span>${formatDate(project.endDate)}</span></div>
        </div>
        ${project.description ? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><label style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;display:block;margin-bottom:4px">Description</label><p style="font-size:13px;color:var(--text-muted);line-height:1.6">${project.description}</p></div>` : ''}
      </div>

      <!-- Budget Overview -->
      <div class="detail-section">
        <h3>Budget Overview</h3>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">
            <span>Budget Utilization</span>
            <strong>${project.budget > 0 ? Math.round(project.spent/project.budget*100) : 0}%</strong>
          </div>
          ${progressBar(project.budget > 0 ? Math.round(project.spent/project.budget*100) : 0, project.spent/project.budget > 0.9 ? '#ef4444' : '#f97316')}
        </div>
        <div class="detail-grid">
          <div class="detail-item"><label>Allocated</label><span style="color:var(--primary);font-weight:700">${formatCurrency(project.budget)}</span></div>
          <div class="detail-item"><label>Spent</label><span style="color:var(--red);font-weight:700">${formatCurrency(project.spent)}</span></div>
          <div class="detail-item"><label>Remaining</label><span style="color:var(--green);font-weight:700">${formatCurrency(project.budget - project.spent)}</span></div>
          <div class="detail-item"><label>Status</label><span>${statusBadge(project.status)}</span></div>
        </div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="detail-section" style="margin-bottom:20px">
      <h3>Overall Progress</h3>
      <div style="margin-bottom:8px;display:flex;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-muted)">Completion</span>
        <strong>${project.progress}%</strong>
      </div>
      ${progressBar(project.progress)}
    </div>

    <!-- Tasks for this project -->
    <div class="card" style="margin-bottom:20px">
      <div class="section-header">
        <div class="section-title">Project Tasks (${tasks.length})</div>
        <div style="display:flex;gap:8px">
          <span class="badge badge-green">${completedTasks} Completed</span>
          <span class="badge badge-blue">${inProgressTasks} In Progress</span>
        </div>
      </div>
      ${tasks.length ? `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Task</th><th>Assigned To</th><th>Priority</th><th>Progress</th><th>Status</th><th>Deadline</th><th>Action</th></tr></thead>
          <tbody>${tasks.map(t => `
            <tr>
              <td><strong>${t.title}</strong></td>
              <td>${t.assignedName}</td>
              <td>${priorityBadge(t.priority)}</td>
              <td style="width:120px">${progressBar(t.progress)} <span style="font-size:11px">${t.progress}%</span></td>
              <td>${statusBadge(t.status)}</td>
              <td>${formatDate(t.deadline)}</td>
              <td><a href="task-detail.html?id=${t.id}" class="btn btn-secondary btn-sm">View</a></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<div class="empty-state"><p>No tasks yet for this project</p></div>'}
    </div>

    <!-- Site Reports for this project -->
    <div class="card">
      <div class="section-header">
        <div class="section-title">Site Reports (${reports.length})</div>
      </div>
      ${reports.length ? reports.map(r => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light)">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="font-size:20px;background:var(--bg);padding:8px;border-radius:8px">📋</div>
            <div>
              <strong style="font-size:13.5px">${r.title}</strong> ${statusBadge(r.status)}
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px"><img src="../../icons/User.svg" alt="👤" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${r.submittedName} · <img src="../../icons/Calendar.svg" alt="📅" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${formatDate(r.date)} · <img src="../../icons/Camera.svg" alt="📸" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${r.photos} photos</div>
              <div style="margin-top:6px">${progressBar(r.progress)} <span style="font-size:11px;color:var(--primary)">${r.progress}%</span></div>
            </div>
          </div>
          <a href="report-detail.html?id=${r.id}" class="btn btn-secondary btn-sm">View Details</a>
        </div>`).join('') : '<div class="empty-state"><p>No site reports for this project</p></div>'}
    </div>
  `;
}

function openEdit() {
  document.getElementById('e-name').value = project.name;
  document.getElementById('e-location').value = project.location;
  document.getElementById('e-status').value = project.status;
  document.getElementById('e-start').value = project.startDate;
  document.getElementById('e-end').value = project.endDate;
  document.getElementById('e-budget').value = project.budget;
  document.getElementById('e-progress').value = project.progress;
  document.getElementById('e-desc').value = project.description || '';
  openModal('edit-modal');
}

function saveProject() {
  const nameEl = document.getElementById('e-name');
  const budgetEl = document.getElementById('e-budget');
  let valid = true;
  clearError(nameEl); clearError(budgetEl);

  if (!nameEl.value.trim()) { showError(nameEl, 'Project name is required'); valid = false; }
  if (!budgetEl.value || Number(budgetEl.value) <= 0) { showError(budgetEl, 'Valid budget required'); valid = false; }
  const startEl = document.getElementById('e-start');
  const endEl = document.getElementById('e-end');
  clearError(endEl);
  if (startEl.value && endEl.value && endEl.value <= startEl.value) {
    showError(endEl, 'End date must be after start date'); valid = false;
  }
  const prog = Number(document.getElementById('e-progress').value);
  if (prog < 0 || prog > 100) { showError(document.getElementById('e-progress'), '0–100 only'); valid = false; }
  if (!valid) return;

  update('projects', project.id, {
    name: nameEl.value.trim(),
    location: document.getElementById('e-location').value.trim(),
    status: document.getElementById('e-status').value,
    startDate: startEl.value,
    endDate: endEl.value,
    budget: Number(budgetEl.value),
    progress: prog,
    description: document.getElementById('e-desc').value.trim()
  });
  closeModal('edit-modal');
  showToast('Project updated successfully!');
  renderContent();
}
</script>
</body>
</html>
