<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projects – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="projects.html" class="active"><img src="../../icons/Icon (2).svg" class="nav-icon" width="18" height="18" alt="📁" style="vertical-align:middle;margin-right:8px;"> Projects</a>
        <a href="tasks.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Tasks</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> View Site Reports</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header-row">
        <div class="page-header"><h1>All Projects</h1><p>Manage and track all construction projects</p></div>
        <button onclick="openAddProjectModal()" class="btn btn-primary">+ New Project</button>
      </div>

      <div class="filter-bar">
        <input type="text" id="search" class="form-input" placeholder="Search projects..." oninput="renderProjects()">
        <select id="filter-status" class="form-select" onchange="renderProjects()">
          <option value="">All Status</option><option>On Track</option><option>At Risk</option><option>Delayed</option>
        </select>
      </div>

      <div id="projects-grid" class="grid-2"></div>
    </main>
  </div>
</div>

<!-- Add/Edit Project Modal -->
<div id="proj-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div><h2 id="proj-modal-title">Add New Project</h2><p>Create a new construction project.</p></div>
      <button class="modal-close" onclick="closeModal('proj-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <input type="hidden" id="p-id">
    <div class="form-group"><label class="form-label">Project Name <span class="req">*</span></label><input id="p-name" class="form-input" placeholder="e.g., Skyline Tower" data-required data-maxlen="100"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Client Name <span class="req">*</span></label><input id="p-client-name" class="form-input" placeholder="e.g., Acme Corp" data-required></div>
      <div class="form-group"><label class="form-label">Client Email <span class="req">*</span></label><input id="p-client-email" type="email" class="form-input" placeholder="client@acme.com" data-required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Client Phone <span class="req">*</span></label><input id="p-client-phone" class="form-input" placeholder="e.g., 9876543210" data-required></div>
      <div class="form-group"><label class="form-label">Client Password</label><input id="p-client-password" type="password" class="form-input" placeholder="Min 6 chars"></div>
    </div>
    <div class="form-group"><label class="form-label">Project Location <span class="req">*</span></label><input id="p-location" class="form-input" placeholder="e.g., Mumbai, Maharashtra" data-required></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date <span class="req">*</span></label><input id="p-start" type="date" class="form-input" data-required></div>
      <div class="form-group"><label class="form-label">End Date <span class="req">*</span></label><input id="p-end" type="date" class="form-input" data-required></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Status <span class="req">*</span></label>
        <select id="p-status" class="form-select" data-required>
          <option value="On Track">On Track</option>
          <option value="At Risk">At Risk</option>
          <option value="Delayed">Delayed</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Progress (%)</label><input id="p-progress" type="number" class="form-input" min="0" max="100"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Budget (₹) <span class="req">*</span></label><input id="p-budget" type="number" class="form-input" placeholder="e.g., 25000000" data-required data-min="1"></div>
      <div class="form-group"><label class="form-label">Team Size</label><input id="p-team" type="number" class="form-input" placeholder="e.g., 20" min="1"></div>
    </div>
    <div class="form-group"><label class="form-label">Description</label><textarea id="p-desc" class="form-textarea" placeholder="Project description..." data-maxlen="500"></textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal('proj-modal')" class="btn btn-secondary">Cancel</button>
      <button onclick="saveProject()" class="btn btn-primary" id="proj-save-btn">+ Save Project</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;

function sanitizeName(value) {
  return value.replace(/[^A-Za-z\s]/g, '').replace(/\s{2,}/g, ' ');
}

function sanitizePhone(value) {
  return value.replace(/\D/g, '').slice(0, 10);
}

function isValidName(value) {
  return /^[A-Za-z]+(?:\s+[A-Za-z]+)*$/.test(value);
}

function isValidPhone(value) {
  return /^\d{10}$/.test(value) && value !== '0000000000';
}

function isValidEmail(value) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
}

window.onload = () => {
  initDB();
  user = requireAuth(['project_manager']);
  if (!user) return;
  renderNavbar(user);
  populateProjectForm();
  renderProjects();
};

function populateProjectForm() {
  // Deprecated client select logic
}

function openAddProjectModal() {
  document.getElementById('proj-modal-title').textContent = 'Add New Project';
  document.getElementById('proj-save-btn').textContent = '+ Save Project';
  document.getElementById('p-id').value = '';
  document.getElementById('p-name').value = '';
  document.getElementById('p-client-name').value = '';
  document.getElementById('p-client-email').value = '';
  document.getElementById('p-client-phone').value = '';
  document.getElementById('p-client-password').value = '';
  document.getElementById('p-client-password').placeholder = 'Min 6 chars';
  document.getElementById('p-client-password').parentElement.style.display = 'block';
  document.getElementById('p-location').value = '';
  document.getElementById('p-start').value = '';
  document.getElementById('p-end').value = '';
  document.getElementById('p-budget').value = '';
  document.getElementById('p-team').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-status').value = 'On Track';
  document.getElementById('p-progress').value = '0';
  document.getElementById('p-status').parentElement.style.display = 'none';
  document.getElementById('p-progress').parentElement.style.display = 'none';
  attachProjectValidation();
  openModal('proj-modal');
}

function renderProjects() {
  let projects = getAll('projects').filter(p => p.managerId === user.id);
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  if (q) projects = projects.filter(p => p.name.toLowerCase().includes(q) || p.location.toLowerCase().includes(q));
  if (st) projects = projects.filter(p => p.status === st);

  const grid = document.getElementById('projects-grid');
  if (!projects.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📁</div><h3>No projects found</h3><p>Create your first project to get started</p></div>';
    return;
  }
  grid.innerHTML = projects.map(p => `
    <div class="project-card">
      <div class="project-card-header">
        <div style="background:var(--primary-light);padding:10px;border-radius:10px;display:flex;align-items:center;justify-content:center"><img src="../../icons/Building2.svg" width="22" height="22"></div>
        ${statusBadge(p.status)}
      </div>
      <div class="project-name">${p.name}</div>
      <div class="project-loc"><img src="../../icons/Package.svg" alt="📍" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${p.location}</div>
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12.5px"><span>Progress</span><strong>${p.progress}%</strong></div>
        ${progressBar(p.progress)}
      </div>
      <div class="project-meta-row">
        <span><strong><img src="../../icons/Users.svg" alt="👥" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${p.teamSize}</strong><span style="display:block;font-size:11px">Team</span></span>
        <span><strong><img src="../../icons/Calendar.svg" alt="📅" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${formatDate(p.endDate)}</strong><span style="display:block;font-size:11px">Deadline</span></span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div class="project-budget">${formatCurrency(p.budget)}</div>
        <div style="display:flex;gap:6px">
          <a href="project-detail.html?id=${p.id}" class="btn btn-outline btn-sm">View</a>
          <button onclick="editProject('${p.id}')" class="btn btn-secondary btn-sm">Edit</button>
          <button onclick="deleteProject('${p.id}')" class="btn btn-danger btn-sm">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function editProject(id) {
  const p = getById('projects', id);
  if (!p) return;
  document.getElementById('proj-modal-title').textContent = 'Edit Project';
  document.getElementById('proj-save-btn').textContent = 'Save Changes';
  document.getElementById('p-id').value = p.id;
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-budget').value = p.budget;
  document.getElementById('p-team').value = p.teamSize;
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-status').value = p.status || 'On Track';
  document.getElementById('p-progress').value = p.progress || 0;
  
  document.getElementById('p-start').value = p.startDate || '';
  document.getElementById('p-end').value = p.endDate || '';
  document.getElementById('p-location').value = p.location || '';
  
  const client = getAll('users').find(u => u.id === p.clientId);
  document.getElementById('p-client-name').value = client ? client.name : (p.clientName || '');
  document.getElementById('p-client-email').value = client ? client.email : '';
  document.getElementById('p-client-phone').value = client ? client.phone : '';
  document.getElementById('p-client-password').value = '';
  document.getElementById('p-client-password').placeholder = 'Leave blank to keep current';
  document.getElementById('p-client-password').parentElement.style.display = 'none';
  document.getElementById('p-status').parentElement.style.display = 'block';
  document.getElementById('p-progress').parentElement.style.display = 'block';
  attachProjectValidation();
  openModal('proj-modal');
}

function attachProjectValidation() {
  const nameEl = document.getElementById('p-client-name');
  const phoneEl = document.getElementById('p-client-phone');

  if (nameEl && !nameEl.dataset.validationAttached) {
    nameEl.dataset.validationAttached = 'true';
    nameEl.addEventListener('input', () => {
      const sanitized = sanitizeName(nameEl.value);
      if (nameEl.value !== sanitized) nameEl.value = sanitized;
      clearError(nameEl);
    });
  }

  if (phoneEl && !phoneEl.dataset.validationAttached) {
    phoneEl.dataset.validationAttached = 'true';
    phoneEl.addEventListener('input', () => {
      const sanitized = sanitizePhone(phoneEl.value);
      if (phoneEl.value !== sanitized) phoneEl.value = sanitized;
      clearError(phoneEl);
    });
  }
}

function deleteProject(id) {
  const p = getById('projects', id);
  confirmAction(`Delete project "${p?p.name:id}"? This cannot be undone.`, () => {
    remove('projects', id);
    showToast('Project deleted', 'info');
    renderProjects();
  });
}

function saveProject() {
  const fields = ['p-name','p-client-name','p-client-email','p-client-phone','p-location','p-start','p-end','p-budget'];
  const id = document.getElementById('p-id').value;
  if (!id) fields.push('p-client-password');
  let valid = true;
  fields.forEach(fid => {
    const el = document.getElementById(fid);
    clearError(el);
    if (!el.value.trim()) { showError(el, 'This field is required'); valid = false; }
  });

  const s = document.getElementById('p-start').value;
  const e = document.getElementById('p-end').value;
  
  if (s && e) {
    const sDate = new Date(s);
    const eDate = new Date(e);
    if (sDate > eDate) {
      showError(document.getElementById('p-start'), 'Start date must be before end date');
      valid = false;
    }
  }
  const endEl = document.getElementById('p-end');
  const cnameEl = document.getElementById('p-client-name');
  const cphoneEl = document.getElementById('p-client-phone');
  const budgetEl = document.getElementById('p-budget');
  const teamEl = document.getElementById('p-team');
  const progressEl = document.getElementById('p-progress');
  const statusEl = document.getElementById('p-status');
  cnameEl.value = sanitizeName(cnameEl.value);
  cphoneEl.value = sanitizePhone(cphoneEl.value);
  if (s && e && e <= s) { showError(endEl, 'End date must be after start date'); valid = false; }
  if (!isValidName(cnameEl.value.trim())) {
    showError(cnameEl, 'Client name should contain alphabets only'); valid = false;
  }
  if (!isValidPhone(cphoneEl.value.trim())) {
    showError(cphoneEl, 'Phone number must be 10 digits and cannot be 0000000000'); valid = false;
  }
  if (budgetEl.value && Number(budgetEl.value) <= 0) {
    showError(budgetEl, 'Budget must be greater than 0'); valid = false;
  }
  if (teamEl.value && Number(teamEl.value) <= 0) {
    showError(teamEl, 'Team size must be greater than 0'); valid = false;
  }
  const cpass = document.getElementById('p-client-password').value;
  if (cpass && cpass.length < 6) { showError(document.getElementById('p-client-password'), 'Min 6 characters'); valid = false; }
  if (id && progressEl.value !== '' && (Number(progressEl.value) < 0 || Number(progressEl.value) > 100)) {
    showError(progressEl, 'Progress must be between 0 and 100'); valid = false;
  }
  if (id && statusEl.value === 'Completed' && Number(progressEl.value) !== 100) {
    showError(statusEl, "Status cannot be 'Completed' unless progress is 100%"); valid = false;
  } else if (id && Number(progressEl.value) === 100 && statusEl.value !== 'Completed') {
    showError(progressEl, "Progress is 100%, status must be 'Completed'"); valid = false;
  }
  const cemail = document.getElementById('p-client-email').value.trim();
  if (cemail && !isValidEmail(cemail)) {
    showError(document.getElementById('p-client-email'), 'Invalid email address format');
    valid = false;
  }
  const existingUserWithEmail = getAll('users').find(u => u.email === cemail);
  if (existingUserWithEmail && existingUserWithEmail.id !== getById('projects', id)?.clientId) {
    showError(document.getElementById('p-client-email'), 'This email is already in use by another user');
    valid = false;
  }

  if (!valid) return;

  const idVal = document.getElementById('p-id').value;
  const cname = cnameEl.value.trim();
  const cphone = cphoneEl.value.trim();

  let clientId;
  if (idVal) {
    const p = getById('projects', idVal);
    clientId = p.clientId;
    if (clientId) {
      const updates = { name: cname, email: cemail, phone: cphone };
      if (cpass) updates.password = cpass;
      update('users', clientId, updates);
    }
  } else {
    const newUser = create('users', {
      role: 'client', name: cname, email: cemail, phone: cphone, password: cpass, profileImage: '', status: 'active', createdAt: new Date().toISOString().split('T')[0]
    });
    clientId = (newUser && newUser.id) ? newUser.id : ('U' + Date.now().toString().slice(-4) + Math.floor(Math.random()*1000));
  }

  const data = {
    name: document.getElementById('p-name').value.trim(),
    clientId: clientId,
    clientName: cname,
    location: document.getElementById('p-location').value.trim(),
    startDate: s, endDate: e,
    budget: Number(budgetEl.value),
    allocations: { Materials: 0, Labor: 0, Equipment: 0, Other: 0 },
    spent: 0,
    progress: 0,
    teamSize: Number(teamEl.value) || 1,
    description: document.getElementById('p-desc').value.trim() || 'No description provided.'
  };

  if (idVal) {
    data.status = statusEl.value;
    data.progress = Number(progressEl.value) || 0;
    update('projects', idVal, data); 
    showToast('Project updated!');
  } else { 
    create('projects', { id: genId('P'), progress: 0, spent: 0, status: 'On Track', managerId: user.id, ...data }); 
    create('notifications', {
      id: genId('N'), userId: clientId, type: 'system', title: 'Project Created',
      body: `Your project "${data.name}" has been successfully set up.`, time: 'just now', read: false
    });
    showToast('Project created!'); 
  }

  closeModal('proj-modal');
  document.getElementById('p-id').value = '';
  document.getElementById('proj-modal-title').textContent = 'Add New Project';
  document.getElementById('proj-save-btn').textContent = '+ Save Project';
  renderProjects();
}
</script>
</body>
</html>
