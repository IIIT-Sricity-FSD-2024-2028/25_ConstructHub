<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Site Reports – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="projects.html"><img src="../../icons/Icon (2).svg" class="nav-icon" width="18" height="18" alt="📁" style="vertical-align:middle;margin-right:8px;"> Projects</a>
        <a href="tasks.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Tasks</a>
        <a href="reports.html" class="active"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> View Site Reports</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>View Site Reports</h1><p>View all submitted site reports and track site progress</p></div>

      <div class="filter-bar">
        <button onclick="setFilter('')" id="btn-all" class="btn btn-primary btn-sm">All Reports</button>
        <button onclick="setFilter('Completed')" id="btn-completed" class="btn btn-secondary btn-sm">Completed</button>
        <button onclick="setFilter('In Progress')" id="btn-progress" class="btn btn-secondary btn-sm">In Progress</button>
        <button onclick="renderReports()" class="btn btn-secondary btn-sm">Refresh</button>
        <span style="margin-left:auto;font-size:13px;color:var(--text-muted)" id="report-count"></span>
      </div>

      <div id="reports-list"></div>
    </main>
  </div>
</div>

<!-- Report Detail Modal -->
<div id="report-modal" class="modal-overlay">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <div><h2 id="r-title">Report Details</h2><p id="r-subtitle"></p></div>
      <button class="modal-close" onclick="closeModal('report-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <div id="r-content"></div>
    <div class="modal-footer">
      <button onclick="closeModal('report-modal')" class="btn btn-secondary">Close</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user, activeFilter = '';
window.onload = () => {
  initDB();
  user = requireAuth(['project_manager']);
  if (!user) return;
  renderNavbar(user);
  renderReports();
};

window.addEventListener('focus', () => {
  if (user) {
    renderNavbar(user);
    renderReports();
  }
});

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-bar .btn').forEach(b => b.className = 'btn btn-secondary btn-sm');
  if (!f) document.getElementById('btn-all').className = 'btn btn-primary btn-sm';
  else if (f==='Completed') document.getElementById('btn-completed').className = 'btn btn-primary btn-sm';
  else if (f==='In Progress') document.getElementById('btn-progress').className = 'btn btn-primary btn-sm';
  renderReports();
}

function renderReports() {
  const myProjectIds = getAll('projects').filter(p => p.managerId === user.id).map(p => p.id);
  let reports = getAll('reports').filter(r => myProjectIds.includes(r.projectId));
  if (activeFilter) reports = reports.filter(r => r.status === activeFilter);
  reports.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
  document.getElementById('report-count').textContent = `Showing ${reports.length} report${reports.length!==1?'s':''}`;

  const el = document.getElementById('reports-list');
  if (!reports.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>No reports found</h3><p>Site engineers haven\'t submitted any reports yet.</p></div>'; return; }

  el.innerHTML = reports.map(r => `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="background:var(--primary-light);padding:10px;border-radius:8px;font-size:20px;flex-shrink:0">📄</div>
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <strong style="font-size:14.5px">${r.title}</strong>
              ${statusBadge(r.status)}
            </div>
            <div style="display:flex;gap:16px;font-size:12px;color:var(--text-muted);margin-bottom:8px">
              <span><img src="../../icons/Package.svg" alt="📍" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${r.projectName}</span>
              <span><img src="../../icons/Icon (1).svg" width="14" height="14" style="vertical-align:middle;margin-right:6px"> ${r.submittedName}</span>
              <span><img src="../../icons/CheckCircle2.svg" width="14" height="14" style="vertical-align:middle;margin-right:6px"> ${formatDate(r.date)}</span>
              <span><img src="../../icons/Camera.svg" alt="📸" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> ${r.photos} photos</span>
            </div>
            <div style="font-size:12.5px;color:var(--text-muted)">Progress: <strong style="color:var(--primary)">${r.progress}%</strong></div>
            ${progressBar(r.progress)}
          </div>
        </div>
        <a href="report-detail.html?id=${r.id}" class="btn btn-secondary btn-sm" style="flex-shrink:0"><img src="../../icons/Eye.svg" alt="👁" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> View Details</a>
      </div>
    </div>`).join('');
}

function viewReport(id) {
  const r = getById('reports', id);
  if (!r) return;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-subtitle').textContent = `${r.projectName} · ${r.submittedName} · ${formatDate(r.date)}`;
  document.getElementById('r-content').innerHTML = `
    <div class="detail-grid" style="margin-bottom:16px">
      <div class="detail-item"><label>Project</label><span>${r.projectName}</span></div>
      <div class="detail-item"><label>Submitted By</label><span>${r.submittedName}</span></div>
      <div class="detail-item"><label>Date</label><span>${formatDate(r.date)}</span></div>
      <div class="detail-item"><label>Progress</label><span style="font-weight:700;color:var(--primary)">${r.progress}%</span></div>
      <div class="detail-item"><label>Status</label><span>${statusBadge(r.status)}</span></div>
      <div class="detail-item"><label>Issue Priority</label><span>${priorityBadge(r.priority||'Low')}</span></div>
    </div>
    ${progressBar(r.progress)}
    <div class="divider"></div>
    <div class="detail-item" style="margin-bottom:12px"><label>Work Completed</label><p style="font-size:13.5px;color:var(--text-muted);margin-top:4px;line-height:1.6">${r.workDone}</p></div>
    ${r.issues ? `<div class="detail-item" style="margin-bottom:12px"><label style="color:var(--red)">Issues Encountered</label><p style="font-size:13.5px;color:var(--red);margin-top:4px">${r.issues}</p></div>` : ''}
    ${r.remarks ? `<div class="detail-item" style="margin-bottom:12px"><label>Remarks</label><p style="font-size:13.5px;color:var(--text-muted);margin-top:4px">${r.remarks}</p></div>` : ''}
    ${r.materials && r.materials.length ? `
      <div class="divider"></div>
      <div class="section-title" style="margin-bottom:10px">Materials Used</div>
      <div class="table-wrap">
        <table class="data-table"><thead><tr><th>Material</th><th>Quantity</th><th>Unit</th></tr></thead>
        <tbody>${r.materials.map(m=>`<tr><td>${m.name}</td><td>${m.qty}</td><td>${m.unit}</td></tr>`).join('')}</tbody></table>
      </div>` : ''}
    <div class="divider"></div>
    <div style="display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:13px">
      <span style="font-size:20px"><img src="../../icons/Camera.svg" alt="📸" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> <span>${r.photos} site photo${r.photos!==1?'s':''} uploaded</span>
    </div>`;
  openModal('report-modal');
}
</script>
</body>
</html>
