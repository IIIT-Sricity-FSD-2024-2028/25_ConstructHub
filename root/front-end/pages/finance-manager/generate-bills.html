<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generate Bills – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-budget.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💵" style="vertical-align:middle;margin-right:8px;"> Project Budget</a>
        <a href="expenses.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💸" style="vertical-align:middle;margin-right:8px;"> Expenses</a>
        <a href="generate-bills.html" class="active"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📄" style="vertical-align:middle;margin-right:8px;"> Generate Bills</a>
        <a href="bill-decisions.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Bill Payment Decisions</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="back-btn" onclick="history.back()">← Back</div>
      <div class="page-header"><h1>Generate Bills</h1><p>Create new project bills</p></div>

      <div style="max-width:600px">
        <div class="card">
          <div class="form-group">
            <label class="form-label">Project <span class="req">*</span></label>
            <select id="b-project" class="form-select" data-required onchange="onProjectChange()">
              <option value="">Select project</option>
            </select>
          </div>
          <div class="form-group" style="display: none;">
            <label class="form-label">Client Name</label>
            <input id="b-client" class="form-input" placeholder="Auto-filled from project" disabled>
          </div>
          <div class="form-group">
            <label class="form-label">Milestone <span class="req">*</span></label>
            <input id="b-milestone" class="form-input" placeholder="e.g., Foundation Complete" data-required data-maxlen="100">
          </div>
          <div class="form-group">
            <label class="form-label">Bill Amount (₹) <span class="req">*</span></label>
            <input id="b-amount" type="number" class="form-input" placeholder="e.g., 5000000" data-required data-min="1">
            <span class="form-hint" id="b-budget-hint"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Due Date <span class="req">*</span></label>
            <input id="b-due" type="date" class="form-input" data-required>
          </div>
          <div class="form-group">
            <label class="form-label">Description <span class="req">*</span></label>
            <textarea id="b-desc" class="form-textarea" placeholder="Bill details..." data-required data-maxlen="500"></textarea>
          </div>
          <button onclick="generateBill()" class="btn btn-primary btn-full" style="padding:12px">Generate & Send Bill</button>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Success Modal -->
<div id="success-modal" class="modal-overlay">
  <div class="modal-box" style="max-width:380px;text-align:center">
    <div style="width:60px;height:60px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✅</div>
    <h2 style="font-family:var(--font-head);margin-bottom:8px">Bill Generated & Sent!</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px" id="bill-success-msg">Invoice has been generated and sent to the client successfully.</p>
    <button onclick="resetForm();closeModal('success-modal')" class="btn btn-secondary btn-full">Generate Another</button>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['finance_manager']);
  if (!user) return;
  renderNavbar(user);
  populateProjects();
  // Default due date = 7 days from now
  const d = new Date(); d.setDate(d.getDate()+7);
  document.getElementById('b-due').value = d.toISOString().split('T')[0];
};

function populateProjects() {
  const sel = document.getElementById('b-project');
  sel.innerHTML = '<option value="">Select project</option>';
  getAll('projects').forEach(p => sel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
}

function onProjectChange() {
  const pId = document.getElementById('b-project').value;
  const proj = getById('projects', pId);
  if (proj) {
    document.getElementById('b-client').value = proj.clientName;
    const remaining = proj.budget - proj.spent;
    document.getElementById('b-budget-hint').textContent = `Project budget: ${formatCurrency(proj.budget)} | Remaining: ${formatCurrency(remaining)}`;
  } else {
    document.getElementById('b-client').value = '';
    document.getElementById('b-budget-hint').textContent = '';
  }
}

function generateBill() {
  const fields = ['b-project','b-milestone','b-amount','b-due'];
  let valid = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    clearError(el);
    if (!el.value.trim()) { showError(el, 'This field is required'); valid = false; }
  });

  const amountEl = document.getElementById('b-amount');
  if (amountEl.value && Number(amountEl.value) <= 0) {
    showError(amountEl, 'Amount must be greater than 0'); valid = false;
  }

  const pId = document.getElementById('b-project').value;
  if (pId) {
    const proj = getById('projects', pId);
    const amount = Number(amountEl.value);
    if (proj && amount > (proj.budget - proj.spent)) {
      if (!confirm(`Bill amount (${formatCurrency(amount)}) exceeds remaining budget (${formatCurrency(proj.budget - proj.spent)}). Continue?`)) return;
    }
  }

  const dueEl = document.getElementById('b-due');
  if (dueEl.value && new Date(dueEl.value) < new Date()) {
    showError(dueEl, 'Due date cannot be in the past'); valid = false;
  }

  const desc = document.getElementById('b-desc').value.trim();
  if (!desc) { showError(document.getElementById('b-desc'), 'Description is required'); valid = false; }
  else if (desc.length > 500) { showError(document.getElementById('b-desc'), 'Max 500 characters'); valid = false; }

  if (!valid) return;

  const proj = getById('projects', pId);
  const billId = 'BILL-2024-' + String(getAll('bills').length + 1).padStart(3,'0');
  const bill = {
    id: billId,
    projectId: pId,
    projectName: proj ? proj.name : '',
    clientId: proj ? proj.clientId : '',
    clientName: proj ? proj.clientName : '',
    amount: Number(document.getElementById('b-amount').value),
    milestone: document.getElementById('b-milestone').value.trim(),
    description: document.getElementById('b-desc').value.trim(),
    generatedBy: user.id,
    status: 'Pending',
    decisionDate: '',
    dueDate: document.getElementById('b-due').value,
    rejectionReason: ''
  };
  const savedBill = create('bills', bill);
  if (!savedBill) {
    showToast('Bill could not be generated. Please check your inputs or try again.', 'error');
    return;
  }

  create('notifications', {
    id: genId('N'), userId: bill.clientId, type: 'bill', title: 'New Bill Pending',
    body: `Invoice for ${bill.projectName} requires your approval`, time: 'just now', read: false
  });
  document.getElementById('bill-success-msg').textContent = `${savedBill.id} has been generated and sent to ${proj ? proj.clientName : 'the client'} successfully.`;
  openModal('success-modal');
}

function resetForm() {
  ['b-project','b-milestone','b-amount','b-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('b-client').value = '';
  document.getElementById('b-budget-hint').textContent = '';
  const d = new Date(); d.setDate(d.getDate()+7);
  document.getElementById('b-due').value = d.toISOString().split('T')[0];
}
</script>
</body>
</html>
