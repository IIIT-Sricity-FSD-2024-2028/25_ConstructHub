<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expenses – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-budget.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💵" style="vertical-align:middle;margin-right:8px;"> Project Budget</a>
        <a href="expenses.html" class="active"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💸" style="vertical-align:middle;margin-right:8px;"> Expenses</a>
        <a href="generate-bills.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📄" style="vertical-align:middle;margin-right:8px;"> Generate Bills</a>
        <a href="bill-decisions.html"><img src="../../icons/CheckCircle2.svg" class="nav-icon" width="18" height="18" alt="✅" style="vertical-align:middle;margin-right:8px;"> Bill Payment Decisions</a>
        <a href="messages.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header-row">
        <div class="page-header"><h1>Expenses</h1><p>Track and record project expenses</p></div>
        <button onclick="openModal('expense-modal')" class="btn btn-primary">+ Record Expense</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="search" class="form-input" placeholder="Search expenses..." oninput="renderList()">
        <select id="filter-project" class="form-select" onchange="renderList()"><option value="">All Projects</option></select>
        <select id="filter-cat" class="form-select" onchange="renderList()"><option value="">All Categories</option><option>Materials</option><option>Labor</option><option>Equipment</option><option>Other</option></select>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Project</th><th>Category</th><th>Amount</th><th>Description</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="expenses-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Expense Modal -->
<div id="expense-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div><h2 id="modal-title">Record Expense</h2></div>
      <button class="modal-close" onclick="closeModal('expense-modal')"><img src="../../icons/X.svg" alt="✕" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></button>
    </div>
    <input type="hidden" id="e-id">
    <div class="form-group"><label class="form-label">Expense Category <span class="req">*</span></label>
      <select id="e-cat" class="form-select" data-required>
        <option value="">Select category</option><option>Materials</option><option>Labor</option><option>Equipment</option><option>Other</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Amount (₹) <span class="req">*</span></label><input id="e-amount" type="number" class="form-input" placeholder="50000" data-required data-min="1"></div>
    <div class="form-group"><label class="form-label">Project <span class="req">*</span></label><select id="e-project" class="form-select" data-required><option value="">Select project</option></select></div>
    <div class="form-group"><label class="form-label">Date <span class="req">*</span></label><input id="e-date" type="date" class="form-input" data-required></div>
    <div class="form-group"><label class="form-label">Description <span class="req">*</span></label><textarea id="e-desc" class="form-textarea" placeholder="Expense details..." data-required data-maxlen="300"></textarea></div>
    <div class="modal-footer">
      <button onclick="closeModal('expense-modal')" class="btn btn-secondary">Cancel</button>
      <button onclick="saveExpense()" class="btn btn-primary"><img src="../../icons/DollarSign.svg" alt="💰" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"> Record Expense</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['finance_manager']);
  if (!user) return;
  renderNavbar(user);
  populateFilters();
  document.getElementById('e-date').value = new Date().toISOString().split('T')[0];
  renderList();
};

function populateFilters() {
  const projects = getAll('projects');
  const sel = document.getElementById('filter-project');
  const eSel = document.getElementById('e-project');
  projects.forEach(p => {
    sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    eSel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

function renderList() {
  let expenses = getAll('expenses');
  const q = document.getElementById('search').value.toLowerCase();
  const fp = document.getElementById('filter-project').value;
  const fc = document.getElementById('filter-cat').value;
  if (q) expenses = expenses.filter(e => e.description.toLowerCase().includes(q) || e.projectName.toLowerCase().includes(q));
  if (fp) expenses = expenses.filter(e => e.projectId === fp);
  if (fc) expenses = expenses.filter(e => e.category === fc);

  const tbody = document.getElementById('expenses-tbody');
  if (!expenses.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No expenses found</p></div></td></tr>'; return; }
  tbody.innerHTML = expenses.map(e=>`
    <tr>
      <td><strong>${e.id}</strong></td>
      <td>${e.projectName}</td>
      <td><span class="badge badge-blue">${e.category}</span></td>
      <td style="font-weight:700;color:var(--primary)">${formatCurrency(e.amount)}</td>
      <td style="max-width:200px;color:var(--text-muted)">${e.description}</td>
      <td>${formatDate(e.date)}</td>
      <td class="actions">
        <button onclick="editExpense('${e.id}')" class="btn btn-secondary btn-sm">Edit</button>
        <button onclick="deleteExpense('${e.id}')" class="btn btn-danger btn-sm">Delete</button>
      </td>
    </tr>`).join('');
}


function recalculateProjectSpent(projectId) {
  const exps = getAll('expenses').filter(x => x.projectId === projectId);
  const total = exps.reduce((s, x) => s + x.amount, 0);
  const p = getById('projects', projectId);
  if (p) update('projects', projectId, { spent: total });
}

function editExpense(id) {
  const e = getById('expenses', id);
  if (!e) return;
  document.getElementById('modal-title').textContent = 'Edit Expense';
  document.getElementById('e-id').value = e.id;
  document.getElementById('e-cat').value = e.category;
  document.getElementById('e-amount').value = e.amount;
  document.getElementById('e-project').value = e.projectId;
  
  try {
    document.getElementById('e-date').value = new Date(e.date).toISOString().split('T')[0];
  } catch(err) {
    document.getElementById('e-date').value = e.date;
  }
  document.getElementById('e-desc').value = e.description;
  openModal('expense-modal');
}

function deleteExpense(id) {
  confirmAction('Delete this expense record? This cannot be undone.', () => {
    const e = getById('expenses', id);
    if (e) {
      const pId = e.projectId;
      remove('expenses', id);
      recalculateProjectSpent(pId);
    } else {
      remove('expenses', id);
    }
    showToast('Expense deleted.', 'info');
    renderList();
  });
}

function saveExpense() {
  const fields = ['e-cat','e-amount','e-project','e-date','e-desc'];
  let valid = true;
  fields.forEach(fid => {
    const el = document.getElementById(fid);
    clearError(el);
    if (!el.value.trim()) { showError(el, 'This field is required'); valid = false; }
  });
  if (document.getElementById('e-amount').value && Number(document.getElementById('e-amount').value) <= 0) {
    showError(document.getElementById('e-amount'), 'Amount must be greater than 0'); valid = false;
  }
  if (!valid) return;

  
  const id = document.getElementById('e-id').value;
  const projTarget = getById('projects', document.getElementById('e-project').value);
  const selCat = document.getElementById('e-cat').value;
  const catLimit = projTarget && projTarget.allocations ? projTarget.allocations[selCat] : null;
  if(catLimit !== null && catLimit !== undefined) {
    const amt = Number(document.getElementById('e-amount').value);
    const existing = getAll('expenses').filter(x => x.projectId === projTarget.id && x.category === selCat && x.id !== id);
    const spentSoFar = existing.reduce((s, x) => s + x.amount, 0);
    if(spentSoFar + amt > catLimit) {
      showError(document.getElementById('e-amount'), `Exceeds maximum allocated limit (${formatCurrency(catLimit)}) for ${selCat}`);
      return;
    }
  }

  const pId = document.getElementById('e-project').value;
  const proj = getById('projects', pId);
  const data = {
    category: document.getElementById('e-cat').value,
    amount: Number(document.getElementById('e-amount').value),
    projectId: pId,
    projectName: proj ? proj.name : '',
    date: document.getElementById('e-date').value,
    description: document.getElementById('e-desc').value.trim(),
    recordedBy: user.id
  };
  let oldProjectId = null;
  if (id) {
    const oldE = getById('expenses', id);
    if (oldE) oldProjectId = oldE.projectId;
    update('expenses', id, data);
    showToast('Expense updated!');
  } else {
    create('expenses', { id: genId('E'), ...data });
    showToast('Expense recorded!');
  }
  
  if (proj) recalculateProjectSpent(proj.id);
  if (id && oldProjectId && oldProjectId !== proj.id) {
    recalculateProjectSpent(oldProjectId);
  }

  closeModal('expense-modal');
  document.getElementById('e-id').value = '';
  document.getElementById('modal-title').textContent = 'Record Expense';
  renderList();
}
</script>
</body>
</html>
