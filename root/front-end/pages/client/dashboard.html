<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Dashboard – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-progress.html"><span class="nav-icon"><img src="../../icons/TrendingUp.svg" alt="📊" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Project Details</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="📋" style="vertical-align:middle;margin-right:8px;"> Reports</a>
        <a href="pending-bills.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="💵" style="vertical-align:middle;margin-right:8px;"> Pending Bills</a>
        <a href="payment-decisions.html"><span class="nav-icon">💳</span> Payment Decisions</a>
        <a href="feedback.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="💬" style="vertical-align:middle;margin-right:8px;"> Feedback</a>
        <a href="messages.html"><span class="nav-icon"><img src="../../icons/Send.svg" alt="📩" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Messages</a>
        
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Client Dashboard</h1><p>Track your project progress and manage payments</p></div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card" style="margin-bottom:20px" id="project-card"></div>

      <div style="margin-bottom:20px">
        <div class="card"><div class="section-title" style="margin-bottom:14px">Approved Bills</div><div id="approved-bills"></div></div>
      </div>
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">💬 Have Questions?</div>
        <textarea id="quick-feedback" class="form-textarea" placeholder="Share your feedback, questions, or concerns..." style="min-height:70px;margin-bottom:10px"></textarea>
        <button onclick="submitQuickFeedback()" class="btn btn-primary btn-sm">Send Query</button>
      </div>
    </main>
  </div>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['client']);
  if (!user) return;
  renderNavbar(user);
  renderStats(); renderProjectCard(); renderApprovedBills();
};

function renderStats() {
  const projects = getAll('projects').filter(p => p.clientId === user.id);
  const p = projects[0];
  const projectIds = projects.map(project => project.id);
  const approvedBillsTotal = getAll('bills')
    .filter(bill => projectIds.includes(bill.projectId) && bill.status === 'Approved')
    .reduce((sum, bill) => sum + (Number(bill.amount) || 0), 0);
  const daysLeft = p ? Math.max(0, Math.floor((new Date(p.endDate) - new Date()) / 86400000)) : 0;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-icon"><img src="../../icons/TrendingUp.svg" alt="📊" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value" style="color:var(--primary)">${p ? p.progress : 0}%</div><div class="stat-label">Project Progress</div></div>
    <div class="stat-card"><div class="stat-icon"><img src="../../icons/DollarSign.svg" alt="💰" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value" style="font-size:18px">${formatCurrency(approvedBillsTotal)}</div><div class="stat-label">Budget Used</div></div>
    <div class="stat-card"><div class="stat-icon"><img src="../../icons/Clock.svg" alt="🕐" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value">${daysLeft}</div><div class="stat-label">Days Remaining</div></div>
    <div class="stat-card"><div class="stat-icon"><img src="../../icons/Eye.svg" alt="👁" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></div><div class="stat-value" style="font-size:18px">${p ? formatCurrency(p.budget) : '—'}</div><div class="stat-label">Total Budget</div></div>`;
}

function renderProjectCard() {
  const projects = getAll('projects').filter(p => p.clientId === user.id);
  const p = projects[0];
  const el = document.getElementById('project-card');
  if (!p) { el.innerHTML = '<div class="empty-state"><p>No projects assigned yet</p></div>'; return; }
  el.innerHTML = `
    <a href="project-progress.html" style="display:block;color:inherit;text-decoration:none">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
      <div><h3 style="font-family:var(--font-head);font-weight:700;font-size:18px">${p.name}</h3><div style="font-size:13px;color:var(--text-muted);margin-top:2px">${p.description || 'Construction Project'}</div></div>
      ${statusBadge(p.status)}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:14px;font-size:13px">
      <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Start Date</div><strong>${formatDate(p.startDate)}</strong></div>
      <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Expected Completion</div><strong>${formatDate(p.endDate)}</strong></div>
      <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Project Manager</div><strong>Rajesh Kumar</strong></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px"><span>Overall Progress</span><strong>${p.progress}%</strong></div>
      ${progressBar(p.progress)}
    </div>
    </a>`;
}

function renderApprovedBills() {
  const projects = getAll('projects').filter(p => p.clientId === user.id);
  const pIds = projects.map(p => p.id);
  const bills = getAll('bills')
    .filter(b => pIds.includes(b.projectId) && b.status === 'Approved')
    .sort((a, b) => new Date(b.date || b.dueDate || 0) - new Date(a.date || a.dueDate || 0));
  if (!bills.length) return document.getElementById('approved-bills').innerHTML = '<p class="empty-state">No approved bills found</p>';

  const approvedTotal = bills.reduce((sum, bill) => sum + (Number(bill.amount) || 0), 0);

  document.getElementById('approved-bills').innerHTML = bills.map(b => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light)">
      <div>
        <div style="font-weight:600;font-size:13.5px">${b.name || b.type || 'Bill'}</div>
        <div style="font-size:11.5px;color:var(--text-muted)">${b.projectName || 'Project Bill'} · ${formatDate(b.date || b.dueDate)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:var(--font-head);font-weight:700;color:var(--primary)">${formatCurrency(b.amount)}</span>
        ${statusBadge(b.status)}
      </div>
    </div>`).join('') +
    `<div style="padding-top:12px;border-top:1px solid var(--border);margin-top:4px">
      <div style="display:flex;justify-content:space-between;font-size:13px"><span>Total Approved Bills</span><strong style="color:var(--green)">${formatCurrency(approvedTotal)}</strong></div>
    </div>`;
}

function submitQuickFeedback() {
  const val = document.getElementById('quick-feedback').value.trim();
  if (!val) { showToast('Please enter your feedback', 'warning'); return; }
  const project = getAll('projects').find(projectItem => projectItem.clientId === user.id);
  if (!project) { showToast('No project assigned yet', 'warning'); return; }

  create('notifications', {
    id: genId('N'),
    userId: project.managerId,
    type: 'feedback',
    title: 'Client Feedback',
    body: val,
    clientId: user.id,
    clientName: user.name,
    projectId: project.id,
    projectName: project.name,
    category: 'General',
    subject: 'Quick Query',
    priority: 'Medium',
    createdAt: new Date().toISOString(),
    time: 'just now',
    read: false
  });
  
  document.getElementById('quick-feedback').value = '';
  showToast('Query sent to project manager!', 'success');
}
</script>
</body>
</html>
