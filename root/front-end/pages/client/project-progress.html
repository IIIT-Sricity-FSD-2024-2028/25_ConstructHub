<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Details - ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="Dashboard" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        <a href="project-progress.html" class="active"><span class="nav-icon"><img src="../../icons/TrendingUp.svg" alt="Project Details" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Project Details</a>
        <a href="reports.html"><img src="../../icons/FileText.svg" class="nav-icon" width="18" height="18" alt="Reports" style="vertical-align:middle;margin-right:8px;"> Reports</a>
        <a href="pending-bills.html"><img src="../../icons/DollarSign.svg" class="nav-icon" width="18" height="18" alt="Pending Bills" style="vertical-align:middle;margin-right:8px;"> Pending Bills</a>
        <a href="payment-decisions.html"><span class="nav-icon"><img src="../../icons/DollarSign.svg" alt="Payment Decisions" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Payment Decisions</a>
        <a href="feedback.html"><img src="../../icons/MessageSquare.svg" class="nav-icon" width="18" height="18" alt="Feedback" style="vertical-align:middle;margin-right:8px;"> Feedback</a>
        <a href="messages.html"><span class="nav-icon"><img src="../../icons/Send.svg" alt="Messages" style="vertical-align: -2px; width: 15px; margin: 0 4px;" class="icon-inline"></span> Messages</a>
        <div class="sidebar-divider"></div>
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="Settings" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Project Details</h1><p>View project information and progress</p></div>
      <div id="project-details-content"></div>
    </main>
  </div>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;

window.onload = () => {
  initDB();
  user = requireAuth(['client']);
  if (!user) return;
  renderNavbar(user);
  renderProjectDetails();
};

function getProjectManagerName(project) {
  const manager = getById('users', project.managerId);
  return manager ? manager.name : 'Not assigned';
}

function renderProjectDetails() {
  const project = getAll('projects').find(projectItem => projectItem.clientId === user.id);
  const container = document.getElementById('project-details-content');

  if (!project) {
    container.innerHTML = '<div class="empty-state"><p>No projects assigned yet</p></div>';
    return;
  }

  const remaining = (Number(project.budget) || 0) - (Number(project.spent) || 0);
  const utilization = Number(project.budget) > 0 ? Math.round(((Number(project.spent) || 0) / Number(project.budget)) * 100) : 0;

  container.innerHTML = `
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h3 style="font-family:var(--font-head);font-weight:700;font-size:17px">${project.name}</h3>
          <div style="font-size:12.5px;color:var(--text-muted)">${project.description || 'Construction Project'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${statusBadge(project.status)}
        </div>
      </div>

      <div class="grid-4" style="margin-bottom:16px">
        <div style="background:var(--bg);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--primary);font-weight:700;text-transform:uppercase">Budget</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px">${formatCurrency(project.budget)}</div>
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--red);font-weight:700;text-transform:uppercase">Spent</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px;color:var(--red)">${formatCurrency(project.spent || 0)}</div>
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase">Remaining</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px;color:var(--green)">${formatCurrency(remaining)}</div>
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:12px">
          <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase">Progress</div>
          <div style="font-family:var(--font-head);font-weight:700;font-size:16px;margin-top:4px;color:var(--primary)">${project.progress || 0}%</div>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12.5px"><span>Overall Progress</span><strong>${project.progress || 0}%</strong></div>
        ${progressBar(project.progress || 0)}
      </div>

      <div class="grid-2" style="margin-bottom:16px">
        <div style="background:var(--bg);border-radius:10px;padding:14px">
          <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Project Information</div>
          <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;font-size:13px">
            <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Client Name</div><strong>${project.clientName || user.name}</strong></div>
            <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Project Manager</div><strong>${getProjectManagerName(project)}</strong></div>
            <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Location</div><strong>${project.location || 'N/A'}</strong></div>
            <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Team Size</div><strong>${project.teamSize || 0}</strong></div>
            <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">Start Date</div><strong>${formatDate(project.startDate)}</strong></div>
            <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:3px">End Date</div><strong>${formatDate(project.endDate)}</strong></div>
          </div>
        </div>
        <div style="background:var(--bg);border-radius:10px;padding:14px">
          <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Budget Overview</div>
          <div style="display:flex;flex-direction:column;gap:10px;font-size:13px">
            <div style="display:flex;justify-content:space-between"><span>Total Budget</span><strong>${formatCurrency(project.budget)}</strong></div>
            <div style="display:flex;justify-content:space-between"><span>Total Spent</span><strong style="color:var(--red)">${formatCurrency(project.spent || 0)}</strong></div>
            <div style="display:flex;justify-content:space-between"><span>Remaining Budget</span><strong style="color:var(--green)">${formatCurrency(remaining)}</strong></div>
            <div style="display:flex;justify-content:space-between"><span>Budget Usage</span><strong>${utilization}%</strong></div>
          </div>
        </div>
      </div>
    </div>`;
}
</script>
</body>
</html>
