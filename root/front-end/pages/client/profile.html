<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile – ConstructHub</title>
<link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<div class="app-layout">
  <nav class="navbar" id="navbar"></nav>
  <div class="app-body">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="dashboard.html"><img src="../../icons/Building2.svg" class="nav-icon" width="18" height="18" alt="🏠" style="vertical-align:middle;margin-right:8px;"> Dashboard</a>
        
        <a href="settings.html"><img src="../../icons/Wrench.svg" class="nav-icon" width="18" height="18" alt="⚙️" style="vertical-align:middle;margin-right:8px;"> Settings</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Profile</h1><p>Manage your account settings and preferences</p></div>
      <div class="card" style="max-width:640px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px" id="avatar-section"></div>
        <div class="form-group"><label class="form-label">Full Name <span class="req">*</span></label><input id="p-name" class="form-input" data-required></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Email <span class="req">*</span></label><input id="p-email" type="email" class="form-input" data-required data-email></div>
          <div class="form-group"><label class="form-label">Phone</label><input id="p-phone" class="form-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Company</label><input id="p-company" class="form-input" placeholder="Your company name"></div>
        <div style="display:flex;gap:10px">
          <button onclick="saveProfile()" class="btn btn-primary">Save Changes</button>
          <button class="btn btn-secondary">Cancel</button>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="save-modal" class="modal-overlay">
  <div class="modal-box" style="max-width:340px;text-align:center">
    <div style="width:60px;height:60px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✅</div>
    <h2 style="font-family:var(--font-head);margin-bottom:8px">Changes Saved</h2>
    <button onclick="closeModal('save-modal')" class="btn btn-success btn-full">Done</button>
  </div>
</div>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script>
let user;
window.onload = () => {
  initDB();
  user = requireAuth(['client']);
  if (!user) return;
  renderNavbar(user);
  document.getElementById('avatar-section').innerHTML = `${avatarEl(user.avatar||user.name.substring(0,2).toUpperCase(),60)}<div><strong style="font-size:17px">${user.name}</strong><div style="font-size:13px;color:var(--text-muted)">Client · Member since Jan 2026</div><button class="btn btn-secondary btn-sm" style="margin-top:6px">Change Profile Picture</button></div>`;
  document.getElementById('p-name').value = user.name;
  document.getElementById('p-email').value = user.email;
  document.getElementById('p-phone').value = user.phone||'';
};
function saveProfile() {
  const name = document.getElementById('p-name').value.trim();
  const email = document.getElementById('p-email').value.trim();
  if (!name) { showError(document.getElementById('p-name'),'Required'); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError(document.getElementById('p-email'),'Valid email required'); return; }
  update('users', user.id, { name, email, phone: document.getElementById('p-phone').value.trim() });
  setCurrentUser(getById('users', user.id));
  openModal('save-modal');
}
</script>
</body>
</html>
